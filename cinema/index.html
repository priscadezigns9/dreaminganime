<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Cinema — High-Fidelity Theater Experience</title>
    <link rel="icon" type="image/png" href="https://priscadezigns.org/logos/dreaming-anime-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/da-style.css?v=1.2">
    <style>
        body { background: #000; color: #fff; }
        .theater-main { max-width: 1200px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .theater-player { background: #111; border-radius: 20px; overflow: hidden; position: relative; padding-top: 56.25%; border: 1px solid #222; }
        .theater-playlist { background: #0A0A0A; border: 1px solid #222; border-radius: 20px; padding: 20px; height: 600px; overflow-y: auto; }
        .playlist-item { display: flex; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; border: 1px solid transparent; }
        .playlist-item:hover { background: #111; border-color: #FF6B00; }
        .playlist-item img { width: 100px; height: 60px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>

<nav class="empire-nav" style="background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;">
  <a href="/" class="logo" style="display: flex; align-items: center; gap: 10px; text-decoration:none; color:#fff;">
    <img src="https://priscadezigns.org/logos/dreaming-anime-logo.png" alt="Logo" style="height: 32px; width: 32px; border-radius: 50%;">
    PRISCA <span style="color:#FF6B00;">DEZIGNS</span>
  </a>
  <div class="nav-links">
    <a href="/" style="color:#fff; text-decoration:none; margin-left:20px; font-size:0.8rem;">HOME</a>
    <a href="/manga/" style="color:#fff; text-decoration:none; margin-left:20px; font-size:0.8rem;">THE VAULT</a>
  </div>
</nav>

<section style="padding: 60px 20px; text-align:center;">
    <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_1.webp" alt="Mimi Cinema" style="width:100px; height:auto; margin-bottom:20px; filter: drop-shadow(0 0 20px rgba(255,107,0,0.4));">
    <h1 style="font-family:'Bangers', cursive; font-size:4rem; color:#fff; margin-bottom:10px;">DREAMING CINEMA.</h1>
    <p style="color:#888;">The high-fidelity theater sanctuary.</p>
</section>

<div class="theater-main">
    <div class="theater-player">
        <iframe id="main-player" style="position:absolute; top:0; left:0; width:100%; height:100%;" src="https://www.youtube.com/embed/z6_N62B6oXg" frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="theater-playlist">
        <div class="playlist-item" onclick="document.getElementById('main-player').src='https://www.youtube.com/embed/z6_N62B6oXg'">
            <img src="https://img.youtube.com/vi/z6_N62B6oXg/0.jpg">
            <div><p style="font-size:0.85rem; font-weight:700;">SOLO LEVELING S2</p><p style="font-size:0.7rem; color:#666;">Official Trailer</p></div>
        </div>
        <div class="playlist-item" onclick="document.getElementById('main-player').src='https://www.youtube.com/embed/D8ZRE_6mU8s'">
            <img src="https://img.youtube.com/vi/D8ZRE_6mU8s/0.jpg">
            <div><p style="font-size:0.85rem; font-weight:700;">DEMON SLAYER</p><p style="font-size:0.7rem; color:#666;">Infinity Castle</p></div>
        </div>
        <div class="playlist-item" onclick="document.getElementById('main-player').src='https://www.youtube.com/embed/8YpZ3r5-Dcw'">
            <img src="https://img.youtube.com/vi/8YpZ3r5-Dcw/0.jpg">
            <div><p style="font-size:0.85rem; font-weight:700;">ONE PIECE</p><p style="font-size:0.7rem; color:#666;">Egghead Arc</p></div>
        </div>
    </div>
</div>

<footer style="background:#000; padding:60px 20px; border-top:1px solid #111; text-align:center;">
    <p style="color:#444; font-size:0.8rem;">&copy; 2026 DREAMING ANIME | THE ONE EMPIRE</p>
</footer>

</body>
</html>
