<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #000; --card-bg: #111; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        nav { padding: 15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(15px); }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--primary); font-family:'Bangers', cursive; font-size:1.8rem; }
        .logo img { height:40px; border-radius:50%; border:2px solid var(--primary); }
        
        .cat-bar { padding: 20px 5%; background: #050505; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #111; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-family: 'Space Mono'; font-size: 0.8rem; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .search-container { position: relative; width: 300px; }
        .search-container input { width: 100%; background: #111; border: 1px solid #333; padding: 10px 40px 10px 15px; border-radius: 20px; color: #fff; outline: none; transition: 0.3s; }
        
        .section-header { padding: 30px 5% 10px; font-family:'Bangers'; color:var(--primary); letter-spacing:1px; }
        .anime-grid { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5% 40px; scrollbar-width: none; }
        .anime-grid::-webkit-scrollbar { display: none; }
        .anime-card { flex: 0 0 200px; height: 300px; border-radius: 4px; overflow: hidden; cursor: pointer; transition: transform 0.3s ease; position: relative; }
        .anime-card:hover { transform: scale(1.1); z-index: 10; border: 2px solid var(--primary); }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }
        .studio-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; color: var(--primary); font-weight: 700; }
        
        .hero { height: 60vh; width: 100%; position: relative; display: flex; align-items: center; padding: 0 5%; box-sizing: border-box; border-bottom: 1px solid #222; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); z-index: -1; }
        .hero-title { font-family: 'Bangers'; font-size: 5rem; color: #fff; margin: 0 0 10px; line-height: 1; }
        
        .watch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .watch-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .server-btn { background: #222; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-right: 10px; font-family:'Space Mono'; font-weight:700; }
        .server-btn.active { background: var(--primary); color: #000; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo"><img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_1.webp" alt="Mimi"> DREAMING CINEMA</a>
        <div class="search-container"><input type="text" id="q" placeholder="Search Anime, Studio, Genre..." onkeypress="if(event.key==='Enter')search()"></div>
        <a href="/index.html" style="color:#fff; text-decoration:none; font-weight:700;">HOME</a>
    </nav>
    
    <div class="cat-bar">
        <button class="cat-btn active" onclick="loadCat('Trending Now', '/top/anime?filter=airing', this)">Trending</button>
        <button class="cat-btn" onclick="loadCat('Action', '/anime?genres=1', this)">Action</button>
        <button class="cat-btn" onclick="loadCat('Adventure', '/anime?genres=2', this)">Adventure</button>
        <button class="cat-btn" onclick="loadCat('Comedy', '/anime?genres=4', this)">Comedy</button>
        <button class="cat-btn" onclick="loadCat('Fantasy', '/anime?genres=10', this)">Fantasy</button>
        <button class="cat-btn" onclick="loadCat('Horror', '/anime?genres=14', this)">Horror</button>
        <button class="cat-btn" onclick="loadCat('Romance', '/anime?genres=22', this)">Romance</button>
        <button class="cat-btn" onclick="loadCat('Sci-Fi', '/anime?genres=24', this)">Sci-Fi</button>
        <button class="cat-btn" onclick="loadCat('Studio MAPPA', '/anime?producers=569', this)">MAPPA</button>
        <button class="cat-btn" onclick="loadCat('Ufotable', '/anime?producers=43', this)">Ufotable</button>
    </div>

    <div id="landing">
        <div class="hero" id="hero"></div>
        <div id="cats"></div>
    </div>
    
    <div class="watch-overlay" id="watch">
        <div class="watch-header">
            <h2 id="pt" style="margin:0;">WATCHING...</h2>
            <div>
                <button class="server-btn active" onclick="loadP('vidsrc',this)">SERVER 1</button>
                <button class="server-btn" onclick="loadP('vidsrc.to',this)">SERVER 2</button>
                <button class="server-btn" onclick="loadP('vidsrc.xyz',this)">SERVER 3</button>
            </div>
            <i class="fas fa-times" style="font-size:2rem; cursor:pointer;" onclick="closeP()"></i>
        </div>
        <div class="player-container" id="pf"></div>
    </div>

    <script>
        const API = "https://api.jikan.moe/v4";
        let curId, curEp=1;

        async function fetchJ(u){const r=await fetch(u);return await r.json()}
        
        async function init(){
            const d = await fetchJ(API + "/top/anime?filter=airing&limit=15");
            if(d && d.data) renderHero(d.data[0]);
            loadCat('Trending Now', '/top/anime?filter=airing', document.querySelector('.cat-btn.active'));
        }

        function renderHero(a){
            document.getElementById('hero').innerHTML=`
                <img src="${a.images.jpg.large_image_url}" class="hero-bg">
                <div style="max-width:600px; position:relative; text-shadow: 0 4px 20px #000;">
                    <h1 class="hero-title">${a.title}</h1>
                    <p style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-size: 1.1rem; margin-bottom: 25px;">${a.synopsis || "No synopsis available."}</p>
                    <button class="server-btn" style="background:#FF6B00; color:#000; padding: 15px 40px; font-size: 1.2rem; border-radius: 8px;" onclick="watch(${a.mal_id},'${a.title.replace(/'/g,"")}')">WATCH NOW</button>
                </div>`;
        }

        async function loadCat(name, query, btn){
            if(btn){
                document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
            }
            const c=document.getElementById('cats');
            c.innerHTML = '<div class="section-header"><h2>Loading...</h2></div>';
            const d=await fetchJ(API+query+"&limit=24&order_by=score&sort=desc");
            if(!d || !d.data) return;
            c.innerHTML=`<div class="section-header"><h2>${name}</h2></div><div class="anime-grid" style="flex-wrap:wrap; overflow:visible; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">${d.data.map(a=>`<div class="anime-card" onclick="watch(${a.mal_id},'${a.title.replace(/'/g,"")}')"><img src="${a.images.jpg.large_image_url}"><div class="studio-tag">${a.studios[0]?a.studios[0].name:''}</div></div>`).join('')}</div>`;
        }

        function watch(id,t){
            curId=id;
            document.getElementById('watch').style.display='flex';
            document.getElementById('pt').innerText=t;
            loadP('vidsrc');
        }

        function loadP(s,btn){
            if(btn){document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
            let u;
            if(s==='vidsrc') u = `https://vidsrc.me/embed/anime?malid=${curId}&episode=${curEp}`;
            else if(s==='vidsrc.to') u = `https://vidsrc.to/embed/anime/${curId}/${curEp}`;
            else u = `https://vidsrc.xyz/embed/anime/${curId}/${curEp}`;
            document.getElementById('pf').innerHTML=`<iframe src="${u}" allowfullscreen></iframe>`
        }

        function closeP(){document.getElementById('watch').style.display='none';document.getElementById('pf').innerHTML=''}

        async function search(){
            const q=document.getElementById('q').value; if(!q)return;
            const c=document.getElementById('cats');
            c.innerHTML = '<div class="section-header"><h2>Searching...</h2></div>';
            const d=await fetchJ(API+"/anime?q="+q+"&limit=24");
            document.getElementById('hero').style.display='none';
            c.innerHTML=`<div class="section-header"><h2>Results for ${q}</h2></div><div class="anime-grid" style="flex-wrap:wrap; overflow:visible; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">${d.data.map(a=>`<div class="anime-card" onclick="watch(${a.mal_id},'${a.title.replace(/'/g,"")}')"><img src="${a.images.jpg.large_image_url}"><div class="studio-tag">${a.studios[0]?a.studios[0].name:''}</div></div>`).join('')}</div>`;
        }
        init();
    </script>
</body>
</html>
