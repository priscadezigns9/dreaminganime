<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #000; --card-bg: #111; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        nav { padding: 15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(15px); }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--primary); font-family:'Bangers', cursive; font-size:1.8rem; }
        .logo img { height:40px; border-radius:50%; border:2px solid var(--primary); }
        .search-container { position: relative; width: 300px; }
        .search-container input { width: 100%; background: #111; border: 1px solid #333; padding: 10px 40px 10px 15px; border-radius: 20px; color: #fff; outline: none; transition: 0.3s; }
        .section-header { padding: 30px 5% 10px; }
        .section-header h2 { font-size: 1.5rem; font-weight: 700; color: #e5e5e5; margin: 0; }
        .anime-grid { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5% 40px; scrollbar-width: none; }
        .anime-grid::-webkit-scrollbar { display: none; }
        .anime-card { flex: 0 0 200px; height: 300px; border-radius: 4px; overflow: hidden; cursor: pointer; transition: transform 0.3s ease; }
        .anime-card:hover { transform: scale(1.1); z-index: 10; }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }
        .hero { height: 70vh; width: 100%; position: relative; display: flex; align-items: center; padding: 0 5%; box-sizing: border-box; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); z-index: -1; }
        .hero-content { max-width: 600px; }
        .hero-title { font-family: 'Bangers'; font-size: 5rem; color: #fff; margin: 0 0 20px; line-height: 1; }
        .hero-desc { color: #ccc; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .watch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .watch-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .close-player { color: #fff; font-size: 2rem; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; padding: 12px 30px; border-radius: 4px; text-decoration: none; font-family: 'Bangers'; font-size: 1.2rem; cursor: pointer; border: none; }
        .hidden { display: none !important; }
        .detail-view { padding: 50px 5%; display: none; background: #000; min-height: 100vh; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; padding: 20px 0; }
        .episode-btn { background: #222; padding: 15px; border-radius: 4px; text-align: center; cursor: pointer; }
        .episode-btn:hover { background: var(--primary); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo"><img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_1.webp" alt="Mimi"> DREAMING CINEMA</a>
        <div class="search-container"><input type="text" id="anime-search" placeholder="Search..." onkeypress="if(event.key === 'Enter') searchAnime()"></div>
        <a href="/index.html" style="color:#fff; text-decoration:none; font-weight:700;">HOME</a>
    </nav>
    <div id="landing">
        <div class="hero" id="hero"></div>
        <div class="section-header"><h2>Trending Now</h2></div>
        <div class="anime-grid" id="grid-trending"></div>
        <div class="section-header"><h2>Popular</h2></div>
        <div class="anime-grid" id="grid-popular"></div>
        <div class="section-header"><h2>Action</h2></div>
        <div class="anime-grid" id="grid-action"></div>
    </div>
    <div id="detail" class="detail-view">
        <button class="btn-primary" onclick="showLanding()">BACK</button>
        <div id="detail-content" style="margin-top:40px;"></div>
        <div class="section-header"><h2>Episodes</h2></div>
        <div class="episodes-grid" id="episodes-grid"></div>
    </div>
    <div class="watch-overlay" id="watch">
        <div class="watch-header"><h2 id="player-title">WATCHING...</h2><i class="fas fa-times close-player" onclick="closePlayer()"></i></div>
        <div class="player-container" id="player-frame"></div>
    </div>
    <script>
        const API = "https://api.jikan.moe/v4";
        async function fetchJSON(url) { const res = await fetch(url); return await res.json(); }
        async function init() {
            try {
                const trending = await fetchJSON(`${API}/top/anime?limit=15&filter=airing`);
                renderRow('grid-trending', trending.data);
                renderHero(trending.data[0]);
                const popular = await fetchJSON(`${API}/top/anime?limit=15&filter=bypopularity`);
                renderRow('grid-popular', popular.data);
                const action = await fetchJSON(`${API}/anime?genres=1&limit=15&order_by=score&sort=desc`);
                renderRow('grid-action', action.data);
            } catch(e) { console.error(e); }
        }
        function renderHero(a) {
            document.getElementById('hero').innerHTML = `<img src="${a.images.jpg.large_image_url}" class="hero-bg"><div class="hero-content"><h1 class="hero-title">${a.title}</h1><p class="hero-desc">${a.synopsis}</p><button class="btn-primary" onclick="showAnime(${a.mal_id})">WATCH NOW</button></div>`;
        }
        function renderRow(id, list) {
            document.getElementById(id).innerHTML = list.map(a => `<div class="anime-card" onclick="showAnime(${a.mal_id})"><img src="${a.images.jpg.large_image_url}"></div>`).join('');
        }
        async function showAnime(id) {
            const a = await fetchJSON(`${API}/anime/${id}/full`);
            const e = await fetchJSON(`${API}/anime/${id}/episodes`);
            document.getElementById('landing').style.display = 'none';
            document.getElementById('detail').style.display = 'block';
            window.scrollTo(0,0);
            document.getElementById('detail-content').innerHTML = `<div style="display:flex; gap:40px; flex-wrap:wrap;"><img src="${a.data.images.jpg.large_image_url}" style="width:300px; border-radius:10px;"><div style="flex:1;"><h1 style="font-size:3rem; margin:0;">${a.data.title}</h1><p style="color:#aaa; font-size:1.1rem; line-height:1.6;">${a.data.synopsis}</p></div></div>`;
            document.getElementById('episodes-grid').innerHTML = e.data.map(ep => `<div class="episode-btn" onclick="watch(${a.data.mal_id}, ${ep.mal_id}, '${a.data.title.replace(/'/g, "\\'")}')">EP ${ep.mal_id}</div>`).join('');
        }
        function watch(id, ep, title) {
            document.getElementById('watch').style.display = 'flex';
            document.getElementById('player-title').innerText = title;
            document.getElementById('player-frame').innerHTML = `<iframe src="https://vidsrc.me/embed/anime?malid=${id}&episode=${ep}" allowfullscreen></iframe>`;
        }
        function closePlayer() { document.getElementById('watch').style.display = 'none'; document.getElementById('player-frame').innerHTML = ''; }
        function showLanding() { document.getElementById('landing').style.display = 'block'; document.getElementById('detail').style.display = 'none'; }
        async function searchAnime() {
            const q = document.getElementById('anime-search').value; if(!q) return;
            const data = await fetchJSON(`${API}/anime?q=${q}&limit=20`);
            renderRow('grid-trending', data.data); document.getElementById('hero').style.display = 'none';
        }
        init();
    </script>
</body>
</html>
