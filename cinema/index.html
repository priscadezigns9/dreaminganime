<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>CINEMA | DREAMING ANIME</title> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"> <style> :root { --primary: #FF6B00; --bg: #000; --card-bg: #111; --safe-area-inset-bottom: env(safe-area-inset-bottom); } body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; } nav { padding: 12px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(15px); } .logo { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--primary); font-family:'Bangers', cursive; font-size:1.5rem; } .logo img { height:32px; border-radius:50%; border:1.5px solid var(--primary); } .cat-bar { padding: 12px 5%; background: #050505; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #111; -webkit-overflow-scrolling: touch; } .cat-bar::-webkit-scrollbar { display: none; } .cat-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 6px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-family: 'Space Mono'; font-size: 0.75rem; transition: 0.2s; } .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); } .search-container { position: relative; flex: 1; margin: 0 15px; max-width: 400px; } .search-container input { width: 100%; background: #111; border: 1px solid #333; padding: 8px 35px 8px 12px; border-radius: 20px; color: #fff; outline: none; font-size: 0.9rem; font-family: 'Inter'; } .section-header { padding: 25px 5% 5px; font-family:'Bangers'; color:var(--primary); font-size: 1.2rem; letter-spacing:1px; } .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 10px 5% 40px; } @media (min-width: 600px) { .anime-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; } } .anime-card { aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 1px solid #222; background: #0a0a0a; } .anime-card:hover { transform: scale(1.05); border-color: var(--primary); z-index: 10; } .anime-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; } .anime-card:hover img { filter: brightness(1.1); } .studio-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(255, 107, 0, 0.9); padding: 3px 8px; border-radius: 4px; font-size: 0.65rem; color: #000; font-weight: 800; z-index: 2; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: uppercase; } .anime-title-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); z-index: 1; opacity: 0.8; } .hero { height: 45vh; width: 100%; position: relative; display: flex; align-items: center; padding: 0 5%; box-sizing: border-box; overflow: hidden; border-bottom: 2px solid #111; } @media (min-width: 768px) { .hero { height: 65vh; } } .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) saturate(1.2); z-index: -1; transform: scale(1.02); transition: 1s ease; } .hero-title { font-family: 'Bangers'; font-size: clamp(2.5rem, 10vw, 6rem); color: #fff; margin: 0; line-height: 1; text-transform: uppercase; text-shadow: 0 0 40px rgba(0,0,0,0.8); } .watch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; } .watch-header { padding: 15px 5%; display: flex; flex-direction: column; gap: 15px; border-bottom: 1px solid #222; background: #050505; } @media (min-width: 768px) { .watch-header { flex-direction: row; align-items: center; } } .watch-title-row { display: flex; justify-content: space-between; align-items: center; width: 100%; } .watch-title-row h2 { margin:0; font-family:'Bangers'; color:var(--primary); font-size: 1.5rem; letter-spacing: 1px; } .player-container { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; } .player-container iframe { width: 100%; height: 100%; border: none; } .server-list { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; } .server-btn { background: #111; color: #fff; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family:'Space Mono'; font-weight:700; font-size: 0.7rem; white-space: nowrap; } .server-btn.active { background: var(--primary); color: #000; border-color: var(--primary); } .ep-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; padding: 20px 5%; background: #050505; border-top: 1px solid #222; max-height: 25vh; overflow-y: auto; } .ep-btn { background: #111; border: 1px solid #333; color: #fff; padding: 12px 0; cursor: pointer; font-family: 'Space Mono'; font-size: 0.8rem; border-radius: 4px; text-align: center; } .ep-btn.active { background: var(--primary); color: #000; border-color: var(--primary); } .loader { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style> </head> <body> <nav> <a href="/" class="logo"> <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/logos/dreaming-anime-logo-round.png" alt="Logo"> CINEMA </a> <div class="search-container"><input type="text" id="q" placeholder="SEARCH ANIME..." onkeypress="if(event.key==='Enter')search()"></div> <a href="/index.html" style="color:#fff; text-decoration:none; font-family:'Space Mono'; font-size:0.8rem; font-weight:700;">HOME</a> </nav> <div class="cat-bar" id="catBar"> <button class="cat-btn active" onclick="loadCat('Trending Now', '/top/anime?filter=airing', this)">Trending</button> <button class="cat-btn" onclick="loadCat('Action', '/anime?genres=1', this)">Action</button> <button class="cat-btn" onclick="loadCat('Adventure', '/anime?genres=2', this)">Adventure</button> <button class="cat-btn" onclick="loadCat('Comedy', '/anime?genres=4', this)">Comedy</button> <button class="cat-btn" onclick="loadCat('Fantasy', '/anime?genres=10', this)">Fantasy</button> <button class="cat-btn" onclick="loadCat('Sci-Fi', '/anime?genres=24', this)">Sci-Fi</button> <button class="cat-btn" onclick="loadCat('MAPPA', '/anime?producers=569', this)">MAPPA</button> <button class="cat-btn" onclick="loadCat('Ufotable', '/anime?producers=43', this)">Ufotable</button> </div> <div id="landing"> <div class="hero" id="hero"></div> <div id="cats"></div> </div> <div class="watch-overlay" id="watch"> <div class="watch-header"> <div class="watch-title-row"> <h2 id="pt">WATCHING...</h2> <i class="fas fa-times close-btn" style="font-size: 1.5rem; cursor:pointer;" onclick="closeP()"></i> </div> <div class="server-list"> <button class="server-btn active" onclick="loadP('vidsrc_to',this)">SERVER 1</button> <button class="server-btn" onclick="loadP('vidsrc_me',this)">SERVER 2</button> <button class="server-btn" onclick="loadP('embed_su',this)">SERVER 3</button> <button class="server-btn" onclick="loadP('vidsrc_xyz',this)">SERVER 4</button> <button class="server-btn" onclick="loadP('vidsrc_pro',this)">SERVER 5</button> <button class="server-btn" onclick="loadP('vidsrc_icu',this)">SERVER 6</button> </div> </div> <div class="player-container" id="pf"></div> <div class="ep-selector" id="es"></div> </div> <script> const JIKAN_API = "https://api.jikan.moe/v4"; let curId, curEp=1, totalEps=12, curServ='vidsrc_to'; async function fetchJ(u){ try { const r=await fetch(u); return await r.json(); } catch(e){ return null; } } async function init(){ loadCat('Trending Now', '/top/anime?filter=airing'); } async function loadCat(n, q, btn){ if(btn){ document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); } const c=document.getElementById('cats'); c.innerHTML = '<div class="loader"></div>'; try { const d=await fetchJ(JIKAN_API+q+"&limit=18"); if(n==='Trending Now' && d && d.data && d.data.length > 0){ const top = d.data[Math.floor(Math.random() * Math.min(5, d.data.length))]; document.getElementById('hero').innerHTML = ` <img src="${top.images.jpg.large_image_url}" class="hero-bg"> <div style="z-index:1; width:100%;"> <p style="color:var(--primary); font-family:'Space Mono'; font-size:0.8rem; font-weight:700; margin-bottom:10px; letter-spacing:4px;">FEATURED PREMIERE</p> <h2 class="hero-title">${top.title}</h2> <button class="cat-btn active" style="margin-top:20px; font-size:1rem; padding:12px 30px; font-weight:900;" onclick="watch(${top.mal_id},'${top.title.replace(/'/g,"")}')">WATCH NOW</button> </div> `; } c.innerHTML=`<div class="section-header"><h2>${n}</h2></div><div class="anime-grid">${d.data.map(a=>` <div class="anime-card" onclick="watch(${a.mal_id},'${a.title.replace(/'/g,"")}')"> <img src="${a.images.jpg.large_image_url}" loading="lazy"> <div class="anime-title-overlay"></div> <div class="studio-tag">${a.studios && a.studios[0] ? a.studios[0].name : 'ANIME'}</div> </div>`).join('')}</div>`; } catch(e) { c.innerHTML = '<div style="padding:40px; text-align:center;">Failed to load anime. Please try again.</div>'; } } async function watch(id, t) { curId = id; curEp = 1; document.getElementById('watch').style.display = 'flex'; document.body.style.overflow = 'hidden'; document.getElementById('pt').innerText = t.toUpperCase(); try { const d = await fetchJ(JIKAN_API + "/anime/" + id); totalEps = (d && d.data) ? (d.data.episodes || 12) : 12; renderEps(); loadP(curServ); } catch(e) { totalEps = 12; renderEps(); loadP(curServ); } } function renderEps() { const es = document.getElementById('es'); es.innerHTML = ''; for (let i = 1; i <= totalEps; i++) { const btn = document.createElement('button'); btn.className = 'ep-btn' + (i === curEp ? ' active' : ''); btn.innerText = i; btn.onclick = () => { curEp = i; document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); loadP(curServ); }; es.appendChild(btn); } } function loadP(s, btn) { if (btn) { document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curServ = s; } let u; if (s === 'vidsrc_to') u = `https://vidsrc.to/embed/anime/${curId}/${curEp}`; else if (s === 'vidsrc_me') u = `https://vidsrc.me/embed/anime?malid=${curId}&episode=${curEp}`; else if (s === 'embed_su') u = `https://embed.su/embed/anime/${curId}/${curEp}`; else u = `https://vidsrc.xyz/embed/anime/${curId}/${curEp}`; document.getElementById('pf').innerHTML = ` <div class="loader" id="player-loader" style="position:absolute; z-index: 1;"></div> <iframe src="${u}" allowfullscreen referrerpolicy="no-referrer" style="z-index: 2; width: 100%; height: 100%;" onload="document.getElementById('player-loader').style.display='none'"></iframe>`; } function closeP(){ document.getElementById('watch').style.display='none'; document.body.style.overflow = ''; document.getElementById('pf').innerHTML=''; } async function search(){ const q=document.getElementById('q').value; if(!q)return; const c=document.getElementById('cats'); c.innerHTML = '<div class="loader"></div>'; try { const d=await fetchJ(JIKAN_API+"/anime?q="+q+"&limit=24"); document.getElementById('hero').style.display='none'; if(!d || !d.data || d.data.length === 0) { c.innerHTML = '<div class="section-header"><h2>No results found for "'+q+'"</h2></div>'; return; } c.innerHTML=`<div class="section-header"><h2>Results for "${q}"</h2></div><div class="anime-grid">${d.data.map(a=>` <div class="anime-card" onclick="watch(${a.mal_id},'${a.title.replace(/'/g,"")}')"> <img src="${a.images.jpg.large_image_url}" loading="lazy"> <div class="anime-title-overlay"></div> <div class="studio-tag">${a.studios && a.studios[0] ? a.studios[0].name : 'ANIME'}</div> </div>`).join('')}</div>`; } catch(e) { c.innerHTML = '<div style="padding:40px; text-align:center;">Search failed.</div>'; } } init(); </script> </body> </html>
