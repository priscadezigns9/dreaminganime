<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #050505; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Space Mono', monospace; overflow-x:hidden; }
        nav { background:#000; padding:15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position:sticky; top:0; z-index:100; }
        .logo { font-family:'Bangers'; font-size:1.8rem; color:var(--primary); text-decoration:none; letter-spacing:1px; }
        .search-bar { background:#111; border:1px solid #333; padding:8px 20px; color:#fff; border-radius:30px; width:300px; font-family:inherit; }
        .anime-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:25px; padding:40px 5%; }
        .card { aspect-ratio:2/3; background:#111; border-radius:12px; overflow:hidden; cursor:pointer; position:relative; transition: 0.3s; border:1px solid #222; }
        .card:hover { transform: translateY(-10px); border-color:var(--primary); box-shadow:0 10px 30px rgba(255,107,0,0.2); }
        .card img { width:100%; height:100%; object-fit:cover; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .modal-content { width:95%; max-width:1200px; background:#000; border:1px solid #333; border-radius:16px; overflow:hidden; position:relative; box-shadow:0 0 100px rgba(0,0,0,1); }
        .player-container { width:100%; aspect-ratio:16/9; background:#000; position:relative; }
        .player-loader { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--primary); font-size:2rem; animation: spin 1s linear infinite; display:none; }
        @keyframes spin { 100% { transform:translate(-50%,-50%) rotate(360deg); } }
        .controls { padding:20px 30px; display:flex; justify-content:space-between; align-items:center; background:#111; border-top:1px solid #222; }
        .ep-list { padding:15px 30px; display:flex; gap:10px; overflow-x:auto; background:#0A0A0A; border-top:1px solid #222; }
        .btn-ep { background:#222; border:1px solid #444; color:#fff; padding:8px 16px; cursor:pointer; font-family:inherit; border-radius:4px; font-weight:700; transition:0.2s; }
        .btn-ep.active { background:var(--primary); color:#000; border-color:var(--primary); }
        .btn-ep:hover:not(.active) { border-color:var(--primary); color:var(--primary); }
        select { background:#222; color:#fff; border:1px solid #444; padding:10px 20px; border-radius:8px; font-family:inherit; cursor:pointer; outline:none; }
        .close-btn { font-size:2rem; color:#aaa; cursor:pointer; transition:0.2s; position:absolute; top:20px; right:30px; z-index:10; }
        .close-btn:hover { color:#fff; transform:rotate(90deg); }
        .fs-btn { background:none; border:none; color:#aaa; cursor:pointer; font-size:1.2rem; margin-left:15px; }
        .fs-btn:hover { color:#fff; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">DREAMING CINEMA</a>
        <input type="text" id="q" class="search-bar" placeholder="Search for anime..." onkeypress="if(event.key==='Enter')search()">
        <a href="/index.html" style="color:#aaa; text-decoration:none; font-weight:700; font-size:0.9rem;">EXIT CINEMA</a>
    </nav>
    <div id="grid" class="anime-grid"></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-btn" onclick="closeP()"></i>
            <div class="player-container">
                <div id="loader" class="player-loader"><i class="fas fa-circle-notch"></i></div>
                <div id="player_wrap" style="width:100%; height:100%;"></div>
            </div>
            <div class="controls">
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <h2 id="title" style="margin:0; font-family:'Bangers'; color:var(--primary); font-size:1.5rem; letter-spacing:1px;">WATCHING</h2>
                    <span id="ep-title" style="font-size:0.8rem; color:#888;">EPISODE 1</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <select id="serv" onchange="loadP(this.value)">
                        <option value="vidsrc_cc">Server 1 (Elite - Stable)</option>
                        <option value="vidsrc_me">Server 2 (Legacy - Backup)</option>
                        <option value="vidsrc_to">Server 3 (Classic)</option>
                        <option value="embed_su">Server 4 (Direct)</option>
                        <option value="vidsrc_xyz">Server 5 (Direct V2)</option>
                    </select>
                    <button class="fs-btn" onclick="toggleFS()" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
            <div id="eps" class="ep-list"></div>
        </div>
    </div>
    <script>
        const API = 'https://api.jikan.moe/v4';
        let curId, curEp=1, totalEps=12, curServ='vidsrc_cc';
        async function init(){ try { const r = await fetch(API+'/top/anime?filter=airing&limit=24'); const d = await r.json(); render(d.data); } catch(e){ console.error(e); } }
        function render(data){ 
            const g = document.getElementById('grid'); 
            if(!data) return; 
            g.innerHTML = data.map(a => { 
                const t = a.title.replace(/'/g, "\\'"); 
                return `<div class='card' onclick='watch(${a.mal_id}, "${t}")'><img src='${a.images.jpg.large_image_url}'><div style='position:absolute; bottom:10px; left:10px; background:var(--primary); color:#000; padding:2px 8px; font-size:0.7rem; font-weight:800; border-radius:4px; text-transform:uppercase;'>${a.type}</div></div>`;
            }).join(''); 
        }
        async function search(){ const q = document.getElementById('q').value; if(!q) return; const r = await fetch(API+'/anime?q='+q); const d = await r.json(); render(d.data); }
        async function watch(id, t){ 
            curId = id; curEp = 1; 
            document.getElementById('modal').style.display = 'flex'; 
            document.getElementById('title').innerText = t; 
            document.body.style.overflow = 'hidden'; 
            try { 
                const r = await fetch(API+'/anime/'+id); 
                const d = await r.json(); 
                totalEps = d.data.episodes || 12; 
                renderEps(); loadP(curServ); 
            } catch(e){ renderEps(); loadP(curServ); } 
        }
        function renderEps(){ 
            const e = document.getElementById('eps'); 
            e.innerHTML = ''; 
            document.getElementById('ep-title').innerText = 'EPISODE ' + curEp;
            for(let i=1; i<=totalEps; i++){ 
                const b = document.createElement('button'); 
                b.className = 'btn-ep' + (i===curEp ? ' active':''); 
                b.innerText = i; 
                b.onclick = () => { curEp=i; renderEps(); loadP(curServ); }; 
                e.appendChild(b); 
            } 
        }
        function loadP(s){ 
            curServ = s; 
            let u; 
            document.getElementById('loader').style.display = 'block'; 
            // Optimized Server URLs
            if(s==='vidsrc_cc') u=`https://vidsrc.cc/v2/embed/anime/${curId}/${curEp}`;
            else if(s==='vidsrc_me') u=`https://vidsrc.me/embed/anime?malid=${curId}&episode=${curEp}`;
            else if(s==='vidsrc_to') u=`https://vidsrc.to/embed/anime/${curId}/${curEp}`;
            else if(s==='embed_su') u=`https://embed.su/embed/anime/${curId}/${curEp}`;
            else if(s==='vidsrc_xyz') u=`https://vidsrc.xyz/embed/anime/${curId}/${curEp}`;
            
            document.getElementById('player_wrap').innerHTML = `<iframe src="${u}" style="width:100%; height:100%; border:none;" allowfullscreen referrerpolicy="no-referrer" onload="document.getElementById('loader').style.display='none'"></iframe>`;
        }
        function closeP(){ 
            document.getElementById('modal').style.display='none'; 
            document.getElementById('player_wrap').innerHTML=''; 
            document.body.style.overflow = 'auto'; 
        }
        function toggleFS(){ 
            const el = document.querySelector('.modal-content'); 
            if (!document.fullscreenElement) { 
                if(el.requestFullscreen) el.requestFullscreen(); 
                else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                else if(el.msRequestFullscreen) el.msRequestFullscreen();
            } else { 
                if(document.exitFullscreen) document.exitFullscreen(); 
            } 
        }
        init();
    </script>
</body>
</html>
