<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #000; --card-bg: #111; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        nav { padding: 15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(15px); }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--primary); font-family:'Bangers', cursive; font-size:1.8rem; }
        .logo img { height:40px; border-radius:50%; border:2px solid var(--primary); }
        
        .cat-bar { padding: 20px 5%; background: #050505; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #111; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-family: 'Space Mono'; font-size: 0.8rem; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .search-container { position: relative; width: 300px; }
        .search-container input { width: 100%; background: #111; border: 1px solid #333; padding: 10px 40px 10px 15px; border-radius: 20px; color: #fff; outline: none; transition: 0.3s; }
        
        .section-header { padding: 30px 5% 10px; font-family:'Bangers'; color:var(--primary); letter-spacing:1px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 10px 5% 40px; }
        .anime-card { aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s ease, border-color 0.3s; position: relative; border: 1px solid #222; }
        .anime-card:hover { transform: scale(1.05); z-index: 10; border-color: var(--primary); box-shadow: 0 0 20px rgba(255,107,0,0.3); }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }
        .studio-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; color: var(--primary); font-weight: 700; z-index: 2; }
        .anime-title-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%); z-index: 1; }
        
        .hero { height: 60vh; width: 100%; position: relative; display: flex; align-items: center; padding: 0 5%; box-sizing: border-box; border-bottom: 1px solid #222; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); z-index: -1; }
        .hero-title { font-family: 'Bangers'; font-size: clamp(3rem, 8vw, 6rem); color: #fff; margin: 0 0 10px; line-height: 1; text-transform: uppercase; }
        
        .watch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .watch-header { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #050505; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .server-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .server-btn { background: #111; color: #fff; border: 1px solid #333; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family:'Space Mono'; font-weight:700; font-size: 0.75rem; transition: 0.3s; }
        .server-btn:hover, .server-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .close-btn { font-size: 1.5rem; color: #fff; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: var(--primary); transform: rotate(90deg); }

        .loader { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .search-container { width: 150px; }
            .hero { height: 40vh; }
            .server-list { display: none; } /* Hide servers on mobile to save space */
        }
    
        .ep-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 8px; padding: 20px; background: #050505; border-top: 1px solid #222; max-height: 200px; overflow-y: auto; }
        .ep-btn { background: #111; border: 1px solid #333; color: #fff; padding: 10px; cursor: pointer; font-family: 'Space Mono'; font-size: 0.8rem; border-radius: 4px; transition: 0.3s; text-align: center; }
        .ep-btn:hover, .ep-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
    
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/logos/dreaming-anime-logo-round.png" alt="Logo"> 
            DREAMING CINEMA
        </a>
        <div class="search-container"><input type="text" id="q" placeholder="Search..." onkeypress="if(event.key==='Enter')search()"></div>
        <a href="/index.html" style="color:#fff; text-decoration:none; font-family:'Space Mono'; font-size:0.9rem;">HOME</a>
    </nav>
    
    <div class="cat-bar">
        <button class="cat-btn active" onclick="loadCat('Trending Now', '/top/anime?filter=airing', this)">Trending</button>
        <button class="cat-btn" onclick="loadCat('Action', '/anime?genres=1', this)">Action</button>
        <button class="cat-btn" onclick="loadCat('Adventure', '/anime?genres=2', this)">Adventure</button>
        <button class="cat-btn" onclick="loadCat('Comedy', '/anime?genres=4', this)">Comedy</button>
        <button class="cat-btn" onclick="loadCat('Fantasy', '/anime?genres=10', this)">Fantasy</button>
        <button class="cat-btn" onclick="loadCat('Horror', '/anime?genres=14', this)">Horror</button>
        <button class="cat-btn" onclick="loadCat('Romance', '/anime?genres=22', this)">Romance</button>
        <button class="cat-btn" onclick="loadCat('Studio MAPPA', '/anime?producers=569', this)">MAPPA</button>
        <button class="cat-btn" onclick="loadCat('Ufotable', '/anime?producers=43', this)">Ufotable</button>
        <button class="cat-btn" onclick="loadCat('Bones', '/anime?producers=4', this)">Bones</button>
    </div>

    <div id="landing">
        <div class="hero" id="hero"></div>
        <div id="cats"></div>
    </div>
    
    
    <div class="watch-overlay" id="watch">
        <div class="watch-header">
            <div style="flex: 1;">
                <h2 id="pt" style="margin:0; font-family:'Bangers'; color:var(--primary); font-size: 1.5rem; letter-spacing: 1px;">WATCHING...</h2>
            </div>
            <div class="server-list">
                <button class="server-btn active" onclick="loadP('vidsrc_to',this)">SERVER 1</button>
                <button class="server-btn" onclick="loadP('vidsrc_me',this)">SERVER 2</button>
                <button class="server-btn" onclick="loadP('embed_su',this)">SERVER 3</button>
            </div>
            <div style="margin-left: 20px;">
                <i class="fas fa-times close-btn" onclick="closeP()"></i>
            </div>
        </div>
        <div class="player-container" id="pf"></div>
        <div class="ep-selector" id="es"></div>
    </div>
    

    <script>
        const JIKAN_API = "https://api.jikan.moe/v4";
        
        let curId, curEp=1, totalEps=12;

        async function watch(id, t) {
            curId = id;
            curEp = 1;
            document.getElementById('watch').style.display = 'flex';
            document.getElementById('pt').innerText = t.toUpperCase();
            
            // Fetch total episodes from Jikan
            const d = await fetchJ(JIKAN_API + "/anime/" + id);
            if (d && d.data) {
                totalEps = d.data.episodes || 12;
                renderEps();
            }
            loadP('vidsrc_to');
        }

        function renderEps() {
            const es = document.getElementById('es');
            es.innerHTML = '';
            for (let i = 1; i <= totalEps; i++) {
                const btn = document.createElement('button');
                btn.className = 'ep-btn' + (i === curEp ? ' active' : '');
                btn.innerText = i;
                btn.onclick = () => {
                    curEp = i;
                    document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadP(document.querySelector('.server-btn.active').getAttribute('onclick').split("'")[1]);
                };
                es.appendChild(btn);
            }
        }

        function loadP(s, btn) {
            if (btn) {
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            let u;
            // Enhanced embedding logic with multiple providers
            if (s === 'vidsrc_to') u = `https://vidsrc.to/embed/anime/${curId}/${curEp}`;
            else if (s === 'vidsrc_me') u = `https://vidsrc.me/embed/anime?malid=${curId}&episode=${curEp}`;
            else u = `https://embed.su/embed/anime/${curId}/${curEp}`;
            
            document.getElementById('pf').innerHTML = `
                <div class="loader" id="player-loader" style="position:absolute; z-index: 1;"></div>
                <iframe src="${u}" allowfullscreen referrerpolicy="no-referrer" style="z-index: 2; width: 100%; height: 100%;" onload="document.getElementById('player-loader').style.display='none'"></iframe>`;
        }
    
            let u;
            // Best available anime embed servers using MAL ID
            if(s==='vidsrc_to') u = `https://vidsrc.to/embed/anime/${curId}/${curEp}`;
            else if(s==='vidsrc_me') u = `https://vidsrc.me/embed/anime?malid=${curId}&episode=${curEp}`;
            else u = `https://embed.su/embed/anime/${curId}/${curEp}`;
            
            document.getElementById('pf').innerHTML=`
                <div class="loader" id="player-loader" style="position:absolute;"></div>
                <iframe src="${u}" allowfullscreen referrerpolicy="no-referrer" onload="document.getElementById('player-loader').style.display='none'"></iframe>`;
        }

        function closeP(){
            document.getElementById('watch').style.display='none';
            document.getElementById('pf').innerHTML='';
        }

        async function search(){
            const q=document.getElementById('q').value; if(!q)return;
            const c=document.getElementById('cats');
            c.innerHTML = '<div class="loader"></div>';
            const d=await fetchJ(JIKAN_API+"/anime?q="+q+"&limit=24");
            document.getElementById('hero').style.display='none';
            if(!d || !d.data || d.data.length === 0) {
                c.innerHTML = '<div class="section-header"><h2>No results found for "'+q+'"</h2></div>';
                return;
            }
            c.innerHTML=`<div class="section-header"><h2>Results for "${q}"</h2></div><div class="anime-grid">${d.data.map(a=>`
                <div class="anime-card" onclick="watch(${a.mal_id},'${a.title.replace(/'/g,"")}')">
                    <img src="${a.images.jpg.large_image_url}" loading="lazy">
                    <div class="anime-title-overlay"></div>
                    <div class="studio-tag">${a.studios && a.studios[0] ? a.studios[0].name : 'ANIME'}</div>
                </div>`).join('')}</div>`;
        }
        init();
    </script>
</body>
</html>
