<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreaming Cinema | High-Fidelity Theater</title>
    <link rel="icon" type="image/png" href="https://priscadezigns.org/logos/dreaming-anime-logo.png">
    
    <!-- FONTAWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #FF6B00; --bg: #0A0A0A; --panel: #111; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; }
        
        nav { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,107,0,0.2); padding: 12px 24px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-family: 'Bangers', cursive; font-size: 1.5rem; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { font-size: 0.8rem; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; transition: 0.3s; }
        .nav-link:hover { color: var(--accent); }

        .cinema-container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }
        .theater-header { text-align: center; margin-bottom: 60px; }
        .theater-title { font-family: 'Bangers', cursive; font-size: 5rem; margin: 0; letter-spacing: 2px; }
        .theater-subtitle { color: var(--accent); font-family: 'Space Mono', monospace; letter-spacing: 5px; font-weight: 700; }

        /* Main Player Area */
        .featured-player { background: #000; border: 1px solid #222; border-radius: 24px; overflow: hidden; margin-bottom: 60px; position: relative; aspect-ratio: 16/9; box-shadow: 0 0 50px rgba(255,107,0,0.1); }
        #player-iframe { width: 100%; height: 100%; border: none; }

        /* Consumet Integration Styles */
        .search-bar { display: flex; gap: 10px; margin-bottom: 40px; }
        .search-input { flex: 1; background: var(--panel); border: 1px solid #333; padding: 15px 25px; border-radius: 12px; color: #fff; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .search-btn { background: var(--accent); border: none; padding: 0 30px; border-radius: 12px; color: #fff; cursor: pointer; font-family: 'Bangers', cursive; font-size: 1.2rem; }

        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; margin-top: 40px; }
        .anime-card { background: var(--panel); border-radius: 16px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .anime-card-info { padding: 15px; }
        .anime-card-title { font-weight: 700; font-size: 0.9rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .loading-spinner { display: none; text-align: center; padding: 40px; font-size: 2rem; color: var(--accent); }
    </style>
</head>
<body>

<nav>
  <a href="/" class="logo">DREAMING <span>ANIME</span></a>
  <div class="nav-links">
    <a href="/cinema/" class="nav-link" style="color:var(--accent)">Cinema</a>
    <a href="/manga/" class="nav-link">The Vault</a>
    <a href="/hub/" class="nav-link">Live Hub</a>
    <a href="/shop/" class="nav-link">Shop</a>
  </div>
</nav>

<div class="cinema-container">
    <div class="theater-header">
        <h1 class="theater-title">DREAMING CINEMA</h1>
        <p class="theater-subtitle">POWERED BY CONSUMET API</p>
    </div>

    <div class="search-bar">
        <input type="text" id="anime-search" class="search-input" placeholder="Search for anime to watch...">
        <button class="search-btn" onclick="searchAnime()">SEARCH</button>
    </div>

    <div class="featured-player" id="main-player-box">
        <iframe id="player-iframe" src="https://www.youtube.com/embed/z6_N62B6oXg?autoplay=1&mute=1" allowfullscreen></iframe>
    </div>

    <div id="loading" class="loading-spinner"><i class="fas fa-circle-notch fa-spin"></i></div>
    <div id="results" class="results-grid">
        <!-- Results populated via JS -->
    </div>
</div>

<script>
    const CONSUMET_URL = 'https://api.consumet.org/anime/gogoanime';

    async function searchAnime() {
        const query = document.getElementById('anime-search').value;
        if (!query) return;

        const loader = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        
        loader.style.display = 'block';
        resultsDiv.innerHTML = '';

        try {
            const response = await fetch(`${CONSUMET_URL}/${query}`);
            const data = await response.json();
            
            loader.style.display = 'none';
            
            if (data.results && data.results.length > 0) {
                data.results.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    card.onclick = () => loadAnime(anime.id);
                    card.innerHTML = `
                        <img src="${anime.image}" alt="${anime.title}">
                        <div class="anime-card-info">
                            <h3 class="anime-card-title">${anime.title}</h3>
                            <p style="font-size:0.7rem; color:#666; margin-top:5px;">${anime.releaseDate || 'N/A'}</p>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            } else {
                resultsDiv.innerHTML = '<p style="text-align:center; width:100%; color:#666;">No results found.</p>';
            }
        } catch (error) {
            console.error('Error fetching anime:', error);
            loader.style.display = 'none';
            resultsDiv.innerHTML = '<p style="text-align:center; width:100%; color:red;">Error connecting to API.</p>';
        }
    }

    async function loadAnime(animeId) {
        // First get the info to get episodes
        try {
            const response = await fetch(`${CONSUMET_URL}/info/${animeId}`);
            const info = await response.json();
            
            if (info.episodes && info.episodes.length > 0) {
                // Get first episode source
                const epId = info.episodes[0].id;
                const watchResponse = await fetch(`${CONSUMET_URL}/watch/${epId}`);
                const watchData = await watchResponse.json();
                
                // Consumet returns an array of sources. We'll try to find the 'default' or highest quality.
                // For simplicity, we'll use a direct embed player or a placeholder
                // Note: Most modern streaming UI uses an iframe embedder for GogoAnime
                const embedUrl = `https://www.rapidvideo.com/e/${epId}`; // Example placeholder
                
                // Update player
                document.getElementById('player-iframe').src = `https://vidsrc.me/embed/anime?id=${animeId}`; // Common high-fidelity embed source
                
                // Scroll to player
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } catch (error) {
            console.error('Error loading anime details:', error);
        }
    }

    // Default trending search on load
    window.onload = () => {
        document.getElementById('anime-search').value = 'Solo Leveling';
        searchAnime();
    };
</script>

</body>
</html>
