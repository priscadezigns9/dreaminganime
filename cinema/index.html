<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #000; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; }
        nav { padding: 15px 5%; display:flex; justify-content:space-between; align-items:center; background: #050505; border-bottom:1px solid #222; position:sticky; top:0; z-index:100; }
        .logo { font-family:'Bangers'; color:var(--primary); text-decoration:none; font-size:1.8rem; }
        .search-bar { flex:1; margin:0 20px; max-width:400px; background:#111; border:1px solid #333; padding:10px; border-radius:20px; color:#fff; outline:none; }
        .anime-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:20px; padding:40px 5%; }
        .card { aspect-ratio:2/3; background:#111; border-radius:8px; overflow:hidden; cursor:pointer; position:relative; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width:100%; height:100%; object-fit:cover; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:none; flex-direction:column; }
        .player { flex:1; background:#000; }
        .controls { padding:20px 5%; background:#050505; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; }
        .ep-list { padding:20px 5%; display:flex; gap:10px; overflow-x:auto; background:#050505; border-top:1px solid #222; }
        .btn-ep { background:#111; border:1px solid #333; color:#fff; padding:10px 20px; cursor:pointer; font-family:'Space Mono'; min-width:60px; text-align:center; }
        .btn-ep.active { background:var(--primary); color:#000; font-weight:800; border-color:var(--primary); }
        select { background:#111; color:#fff; border:1px solid #333; padding:8px 15px; border-radius:4px; font-family:'Space Mono'; cursor:pointer; font-weight:700; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">DREAMING ANIME CINEMA</a>
        <input type="text" id="q" class="search-bar" placeholder="Search Anime..." onkeypress="if(event.key==='Enter')search()">
        <a href="/index.html" style="color:#fff; text-decoration:none; font-family:'Space Mono'; font-weight:700;">BACK HOME</a>
    </nav>
    <div id="grid" class="anime-grid"></div>
    <div id="watch" class="overlay">
        <div class="controls">
            <h2 id="title" style="margin:0; font-family:'Bangers'; color:var(--primary); letter-spacing:1px;">WATCHING</h2>
            <div style="display:flex; gap:15px; align-items:center;">
                <select id="serv" onchange="loadP(this.value)">
                    <option value="vidsrc_to">Server 1 (Primary)</option>
                    <option value="vidsrc_me">Server 2 (Fallback)</option>
                    <option value="embed_su">Server 3 (Speed)</option>
                    <option value="vidsrc_xyz">Server 4 (Direct)</option>
                    <option value="vidsrc_pro">Server 5 (Elite)</option>
                    <option value="vidsrc_icu">Server 6 (Safety)</option>
                </select>
                <i class="fas fa-times" style="cursor:pointer; font-size:1.8rem; color:#fff;" onclick="closeP()"></i>
            </div>
        </div>
        <div id="player" class="player"></div>
        <div id="eps" class="ep-list"></div>
    </div>
    <script>
        const API = 'https://api.jikan.moe/v4';
        let curId, curEp=1, totalEps=12, curServ='vidsrc_to';
        async function init(){ try { const r = await fetch(API+'/top/anime?limit=18'); const d = await r.json(); render(d.data); } catch(e){ console.error(e); } }
        function render(data){ const g = document.getElementById('grid'); if(!data) return; g.innerHTML = data.map(a => `<div class='card' onclick='watch(${a.mal_id}, "${a.title.replace(/"/g, "'")}")'><img src='${a.images.jpg.large_image_url}'><div style='position:absolute; bottom:10px; left:10px; background:var(--primary); color:#000; padding:2px 8px; font-size:0.7rem; font-weight:800; border-radius:4px; text-transform:uppercase;'>${a.type}</div></div>`).join(''); }
        async function search(){ const q = document.getElementById('q').value; if(!q) return; const r = await fetch(API+'/anime?q='+q); const d = await r.json(); render(d.data); }
        async function watch(id, t){ curId = id; curEp = 1; document.getElementById('watch').style.display = 'flex'; document.getElementById('title').innerText = t; document.body.style.overflow = 'hidden'; try { const r = await fetch(API+'/anime/'+id); const d = await r.json(); totalEps = d.data.episodes || 12; renderEps(); loadP(curServ); } catch(e){ renderEps(); loadP(curServ); } }
        function renderEps(){ const e = document.getElementById('eps'); e.innerHTML = ''; for(let i=1; i<=totalEps; i++){ const b = document.createElement('button'); b.className = 'btn-ep' + (i===curEp ? ' active':''); b.innerText = i; b.onclick = () => { curEp=i; renderEps(); loadP(curServ); }; e.appendChild(b); } }
        function loadP(s){ curServ = s; let u; if(s==='vidsrc_to') u='https://vidsrc.to/embed/anime/'+curId+'/'+curEp; else if(s==='vidsrc_me') u='https://vidsrc.me/embed/anime?malid='+curId+'&episode='+curEp; else if(s==='embed_su') u='https://embed.su/embed/anime/'+curId+'/'+curEp; else if(s==='vidsrc_xyz') u='https://vidsrc.xyz/embed/anime/'+curId+'/'+curEp; else if(s==='vidsrc_pro') u='https://vidsrc.pro/embed/anime/'+curId+'/'+curEp; else if(s==='vidsrc_icu') u='https://vidsrc.icu/embed/anime/'+curId+'/'+curEp; document.getElementById('player').innerHTML = '<iframe src=\"'+u+'\" style=\"width:100%; height:100%; border:none;\" allowfullscreen referrerpolicy=\"no-referrer\"></iframe>'; }
        function closeP(){ document.getElementById('watch').style.display='none'; document.getElementById('player').innerHTML=''; document.body.style.overflow = 'auto'; }
        init();
    </script>
</body>
</html>
