<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #FF6B00; 
            --bg: #030303; 
            --panel: #0A0A0A;
            --border: #1A1A1A;
            --text-dim: #888;
        }
        
        body, html { margin:0; padding:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x:hidden; }
        
        /* Navigation */
        nav { background:#000; padding:15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
        .logo { font-family:'Bangers'; font-size:2.2rem; color:var(--primary); text-decoration:none; letter-spacing:1px; }
        .search-bar { background:#080808; border:1px solid #222; padding:12px 25px; color:#fff; border-radius:8px; width:280px; font-family:inherit; outline: none; }
        .search-bar:focus { border-color: var(--primary); }

        /* Grid */
        .anime-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:25px; padding:40px 5%; }
        .card { aspect-ratio:2/3; background:#080808; border-radius:10px; overflow:hidden; cursor:pointer; position:relative; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border:1px solid #111; }
        .card:hover { transform: translateY(-8px); border-color:var(--primary); box-shadow: 0 10px 30px rgba(255,107,0,0.15); }
        .card img { width:100%; height:100%; object-fit:cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }
        .card-title { position:absolute; bottom:0; left:0; right:0; padding:15px; background:linear-gradient(transparent, rgba(0,0,0,0.95)); font-size:0.8rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* Full Page Cinema (V10 - Stability Core) */
        #cinema-view { display:none; min-height:100vh; background:var(--bg); position:absolute; top:0; left:0; width:100%; z-index:1000; padding-bottom:100px; }
        
        .cinema-header { padding:15px 5%; background:#000; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:20px; position:sticky; top:0; z-index:1001; }
        .back-btn { background:#111; color:#fff; border:1px solid #222; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:700; display:flex; align-items:center; gap:10px; font-size:0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .back-btn:hover { background:var(--primary); border-color:var(--primary); }

        .cinema-main { max-width:1500px; margin:40px auto; padding:0 4%; display:grid; grid-template-columns: 1fr 380px; gap:35px; }
        @media (max-width: 1200px) { .cinema-main { grid-template-columns: 1fr; } }

        .player-wrapper { width:100%; background:#000; border-radius:15px; overflow:hidden; border:1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.7); position:relative; }
        .aspect-ratio { width:100%; aspect-ratio:16/9; position:relative; background:#000; }
        iframe { width:100%; height:100%; border:none; position:absolute; top:0; left:0; z-index: 5; }

        .player-footer { background:var(--panel); padding:20px 30px; display:flex; flex-wrap:wrap; gap:20px; border-top:1px solid var(--border); align-items:center; }
        .server-group { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .serv-btn { background:#151515; border:1px solid #222; color:#777; padding:10px 18px; border-radius:6px; cursor:pointer; font-size:0.75rem; font-weight:700; transition: 0.3s; }
        .serv-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); box-shadow: 0 0 20px rgba(255,107,0,0.3); }
        .serv-btn:hover:not(.active) { border-color: #444; color: #fff; }

        .episode-panel { background:var(--panel); border-radius:15px; border:1px solid var(--border); padding:30px; height:fit-content; position: sticky; top: 100px; }
        .ep-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap:12px; margin-top:20px; max-height:600px; overflow-y:auto; padding-right:10px; }
        .ep-item { background:#151515; border:1px solid #222; color:#fff; padding:14px 5px; border-radius:6px; text-align:center; cursor:pointer; font-size:0.85rem; font-weight:700; transition: 0.2s; }
        .ep-item:hover, .ep-item.active { background:var(--primary); border-color:var(--primary); color:#fff; }

        .anime-details { margin-top:40px; }
        .anime-title { font-family:'Bangers'; font-size:3rem; color:var(--primary); margin:0 0 10px 0; letter-spacing: 1px; }
        .anime-meta { display:flex; gap:20px; color:var(--text-dim); font-size:0.85rem; font-weight:700; text-transform: uppercase; margin-bottom: 25px; }
        .anime-desc { color:#aaa; line-height:1.8; font-size:1rem; max-width: 950px; border-left: 3px solid var(--primary); padding-left: 20px; }

        /* Status Loader */
        #loader { position:absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:10; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .spinner { width:45px; height:45px; border:3px solid rgba(255,107,0,0.1); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s infinite linear; margin-bottom:20px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loader-text { font-size:0.75rem; letter-spacing:3px; color:var(--primary); font-weight:800; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Custom UI fixes */
        .status-badge { background: #1a1a1a; padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; color: #4CAF50; border: 1px solid #2e7d32; display: inline-flex; align-items: center; gap: 5px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <nav id="top-nav">
        <a href="/" class="logo">DREAMING ANIME</a>
        <input type="text" class="search-bar" placeholder="Search shows..." onkeyup="if(event.key==='Enter') searchAnime(this.value)">
    </nav>

    <div id="grid" class="anime-grid"></div>

    <div id="cinema-view">
        <div class="cinema-header">
            <button class="back-btn" onclick="closeCinema()"><i class="fas fa-arrow-left"></i> RETURN TO HUB</button>
            <div style="margin-left:auto; display:flex; align-items:center; gap:15px;">
                <div class="status-badge"><i class="fas fa-circle" style="font-size:0.5rem"></i> STABLE CORE V10</div>
                <div style="color:#333; font-size:0.7rem; font-weight:800; letter-spacing: 2px;">DREAMING CINEMA</div>
            </div>
        </div>

        <div class="cinema-main">
            <div class="viewing-area">
                <div class="player-wrapper">
                    <div class="aspect-ratio" id="player-container">
                        <!-- PLAYER INJECTED HERE -->
                    </div>
                    <div class="player-footer">
                        <div class="server-group">
                            <span style="font-size:0.65rem; font-weight:800; color:#444; text-transform:uppercase;">Transmission Nodes:</span>
                            <div class="serv-list" id="serv-list">
                                <button class="serv-btn active" onclick="setServ('vidsrc_xyz')">NODE 1 (STABLE)</button>
                                <button class="serv-btn" onclick="setServ('vidsrc_to')">NODE 2 (FAST)</button>
                                <button class="serv-btn" onclick="setServ('vidsrc_me')">NODE 3 (LEGACY)</button>
                                <button class="serv-btn" onclick="setServ('embed_su')">NODE 4 (MIRROR)</button>
                            </div>
                        </div>
                        <button class="back-btn" style="margin-left:auto; background:#111; border:1px solid #222;" onclick="refreshPlayer()"><i class="fas fa-sync-alt"></i> RE-ESTABLISH</button>
                    </div>
                </div>

                <div class="anime-details">
                    <h1 class="anime-title" id="m-title">INITIALIZING...</h1>
                    <div class="anime-meta">
                        <span id="m-ep" style="color:var(--primary)">EPISODE 1</span>
                        <span>•</span>
                        <span id="m-status">AIRING</span>
                        <span>•</span>
                        <span id="m-id">MAL ID: --</span>
                    </div>
                    <p class="anime-desc" id="m-desc">Establishing a high-fidelity connection to the transmission source...</p>
                </div>
            </div>

            <div class="episode-panel">
                <h3 style="margin:0; font-size:0.9rem; letter-spacing:2px; border-bottom: 1px solid var(--border); padding-bottom: 20px; color:var(--text-dim)">EPISODE MATRIX</h3>
                <div class="ep-grid" id="ep-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const JIKAN = 'https://api.jikan.moe/v4';
        let curId = null;
        let curEp = 1;
        let curServ = 'vidsrc_xyz';
        let totalEps = 0;

        async function init(){
            const g = document.getElementById('grid');
            g.innerHTML = Array(12).fill('<div class="card" style="opacity:0.05"></div>').join('');
            try {
                const r = await fetch(`${JIKAN}/top/anime?filter=airing&limit=24`);
                const d = await r.json();
                renderGrid(d.data);
            } catch(e) {
                const r = await fetch(`${JIKAN}/top/anime?limit=24`);
                const d = await r.json();
                renderGrid(d.data);
            }
        }

        async function searchAnime(q){
            if(!q) return init();
            document.getElementById('grid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px;">Searching Transmission...</div>';
            try {
                const r = await fetch(`${JIKAN}/anime?q=${encodeURIComponent(q)}&limit=24`);
                const d = await r.json();
                renderGrid(d.data);
            } catch(e) {}
        }

        function renderGrid(data){
            const g = document.getElementById('grid');
            if(!data || data.length === 0) {
                g.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px;">No Transmissions Found.</div>';
                return;
            }
            g.innerHTML = data.map(i => `
                <div class="card" onclick="openCinema(${i.mal_id}, 1)">
                    <img src="${i.images.webp.large_image_url || i.images.jpg.large_image_url}" loading="lazy">
                    <div class="card-title">${i.title}</div>
                </div>
            `).join('');
        }

        async function openCinema(id, ep){
            curId = id;
            curEp = ep;
            document.getElementById('cinema-view').style.display = 'block';
            document.getElementById('top-nav').style.display = 'none';
            document.body.style.overflow = 'hidden';
            window.scrollTo(0,0);

            try {
                const r = await fetch(`${JIKAN}/anime/${id}`);
                const d = await r.json();
                const anime = d.data;
                document.getElementById('m-title').innerText = anime.title;
                document.getElementById('m-desc').innerText = anime.synopsis || 'Transmission summary unavailable.';
                document.getElementById('m-id').innerText = `MAL ID: ${id}`;
                document.getElementById('m-status').innerText = anime.status;
                totalEps = anime.episodes || 24;
                renderEpisodes(totalEps);
            } catch(e) {
                totalEps = 24;
                renderEpisodes(24);
            }
            loadPlayer();
        }

        function renderEpisodes(count){
            const grid = document.getElementById('ep-grid');
            let html = '';
            for(let i=1; i<=count; i++){
                html += `<div class="ep-item ${i===curEp?'active':''}" onclick="setEp(${i})">${i}</div>`;
            }
            grid.innerHTML = html;
        }

        function loadPlayer(){
            const container = document.getElementById('player-container');
            document.getElementById('m-ep').innerText = `EPISODE ${curEp}`;
            
            let u;
            // Stability Core Mapping
            if(curServ==='vidsrc_xyz') u=`https://vidsrc.xyz/embed/anime/${curId}/${curEp}`;
            else if(curServ==='vidsrc_to') u=`https://vidsrc.to/embed/anime/${curId}/${curEp}`;
            else if(curServ==='vidsrc_me') u=`https://vidsrc.me/embed/anime?malid=${curId}&episode=${curEp}`;
            else if(curServ==='embed_su') u=`https://embed.su/embed/anime/${curId}/${curEp}`;
            
            container.innerHTML = `
                <div id="loader">
                    <div class="spinner"></div>
                    <div class="loader-text">ESTABLISHING STABLE HANDSHAKE...</div>
                </div>
                <iframe src="${u}" allowfullscreen referrerpolicy="no-referrer" onload="document.getElementById('loader').style.display='none'"></iframe>
            `;
        }

        function setServ(s){
            curServ = s;
            const btns = document.querySelectorAll('.serv-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if(s==='vidsrc_xyz') btns[0].classList.add('active');
            if(s==='vidsrc_to') btns[1].classList.add('active');
            if(s==='vidsrc_me') btns[2].classList.add('active');
            if(s==='embed_su') btns[3].classList.add('active');
            loadPlayer();
        }

        function setEp(e){
            curEp = e;
            document.querySelectorAll('.ep-item').forEach((item, idx) => {
                if(idx+1 === e) item.classList.add('active');
                else item.classList.remove('active');
            });
            window.scrollTo({top: 0, behavior: 'smooth'});
            loadPlayer();
        }

        function refreshPlayer(){ loadPlayer(); }

        function closeCinema(){
            document.getElementById('cinema-view').style.display = 'none';
            document.getElementById('top-nav').style.display = 'flex';
            document.body.style.overflow = 'auto';
            document.getElementById('player-container').innerHTML = '';
        }

        init();
    </script>
</body>
</html>
