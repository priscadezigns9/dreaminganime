<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | DREAMING ANIME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #000; --card-bg: #111; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navigation */
        nav { padding: 15px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 1000; backdrop-filter: blur(15px); }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--primary); font-family:'Bangers', cursive; font-size:1.8rem; }
        .logo img { height:40px; border-radius:50%; border:2px solid var(--primary); }
        
        .search-container { position: relative; width: 300px; }
        .search-container input { width: 100%; background: #111; border: 1px solid #333; padding: 10px 40px 10px 15px; border-radius: 20px; color: #fff; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,107,0,0.2); }
        .search-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; }

        /* Main Layout */
        #app { min-height: 100vh; padding-bottom: 100px; }
        
        /* Hero Section */
        .hero { height: 60vh; width: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: flex-start; padding: 0 5%; box-sizing: border-box; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); z-index: -1; }
        .hero-content { max-width: 600px; }
        .hero-tag { color: var(--primary); font-family: 'Space Mono'; font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 10px; display: block; }
        .hero-title { font-family: 'Bangers'; font-size: 5rem; margin: 0 0 20px; line-height: 1; color: #fff; }
        .hero-desc { color: #ccc; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Section Containers */
        .section-header { padding: 50px 5% 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-header h2 { font-family: 'Bangers'; font-size: 2.5rem; color: var(--primary); margin: 0; }
        
        .anime-grid { padding: 0 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .anime-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #222; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(255,107,0,0.2); }
        .anime-card img { width: 100%; height: 280px; object-fit: cover; }
        .anime-card .info { padding: 15px; }
        .anime-card h3 { font-size: 1rem; margin: 0 0 8px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-card p { font-size: 0.8rem; color: #666; margin: 0; }
        .score-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #FFD700; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; border: 1px solid #FFD700; }

        /* Detail View */
        .detail-view { padding: 50px 5%; display: none; }
        .detail-hero { display: flex; gap: 50px; flex-wrap: wrap; margin-bottom: 60px; }
        .detail-poster { width: 350px; border-radius: 20px; box-shadow: 0 0 50px rgba(255,107,0,0.3); border: 2px solid var(--primary); }
        .detail-info { flex: 1; min-width: 300px; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 30px; }
        .episode-btn { background: #222; color: #fff; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; font-weight: bold; }
        .episode-btn:hover { background: var(--primary); border-color: #fff; }

        /* Watch Modal */
        .watch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .watch-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .close-player { color: #fff; font-size: 2rem; cursor: pointer; }
        
        /* Mimi Loader */
        .mimi-loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5000; display: none; }
        .mimi-loader img { height: 150px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        /* Utilities */
        .btn-primary { background: var(--primary); color: #fff; padding: 12px 30px; border-radius: 6px; text-decoration: none; font-family: 'Bangers'; font-size: 1.2rem; letter-spacing: 1px; display: inline-block; cursor: pointer; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_1.webp" alt="Mimi">
            DREAMING CINEMA
        </a>
        <div class="search-container">
            <input type="text" id="anime-search" placeholder="Search any anime..." onkeypress="if(event.key === 'Enter') searchAnime()">
            <i class="fas fa-search" onclick="searchAnime()"></i>
        </div>
        <div style="display:flex; gap:20px;">
            <a href="/index.html" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.9rem;">HOME</a>
            <a href="https://dreaminganime9.redbubble.com" style="color:var(--primary); text-decoration:none; font-weight:700; font-size:0.9rem;">MERCH</a>
        </div>
    </nav>

    <div id="app">
        <!-- Landing View -->
        <div id="landing-view">
            <div class="hero" id="trending-hero">
                <!-- Injected via JS -->
            </div>

            <div class="section-header">
                <h2>TRENDING NOW</h2>
            </div>
            <div class="anime-grid" id="trending-grid">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Search Results View -->
        <div id="search-view" class="hidden">
            <div class="section-header">
                <h2 id="search-title">SEARCH RESULTS</h2>
                <button class="btn-primary" onclick="showLanding()">BACK TO TRENDING</button>
            </div>
            <div class="anime-grid" id="search-grid"></div>
        </div>

        <!-- Detail View -->
        <div id="detail-view" class="detail-view">
            <div class="detail-hero" id="anime-details"></div>
            <div class="section-header">
                <h2>EPISODES</h2>
            </div>
            <div class="episodes-grid" id="episodes-grid"></div>
        </div>
    </div>

    <!-- Watch Overlay -->
    <div class="watch-overlay" id="watch-overlay">
        <div class="watch-header">
            <h2 id="player-title" style="margin:0; font-family:'Bangers'; color:var(--primary);">WATCHING...</h2>
            <div style="display:flex; align-items:center; gap:20px;">
                <span id="ep-indicator" style="color:#888; font-family:'Space Mono';">EP 01</span>
                <i class="fas fa-times close-player" onclick="closePlayer()"></i>
            </div>
        </div>
        <div class="player-container">
            <div id="player-frame" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#111; color:#555; font-size:1.5rem;">
                <p>Initializing Cinema Engine...</p>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div class="mimi-loader" id="loader">
        <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_1.webp" alt="Mimi Loading">
        <p style="font-family:'Bangers'; font-size:1.5rem; color:var(--primary); margin-top:20px;">Mimi is finding your anime...</p>
    </div>

    <script>
        const API = "https://api.jikan.moe/v4";
        
        async function fetchJSON(url) {
            showLoader(true);
            try {
                const res = await fetch(url);
                const data = await res.json();
                return data;
            } catch (e) {
                console.error(e);
            } finally {
                showLoader(false);
            }
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        async function init() {
            const data = await fetchJSON(`${API}/top/anime?limit=12&filter=airing`);
            renderTrending(data.data);
            renderHero(data.data[0]);
        }

        function renderHero(anime) {
            const hero = document.getElementById('trending-hero');
            hero.innerHTML = `
                <img src="${anime.images.jpg.large_image_url}" class="hero-bg" alt="BG">
                <div class="hero-content">
                    <span class="hero-tag">MUST WATCH</span>
                    <h1 class="hero-title">${anime.title}</h1>
                    <p class="hero-desc">${anime.synopsis}</p>
                    <button class="btn-primary" onclick="showAnime(${anime.mal_id})">VIEW SERIES</button>
                </div>
            `;
        }

        function renderTrending(list) {
            const grid = document.getElementById('trending-grid');
            grid.innerHTML = list.map(anime => `
                <div class="anime-card" onclick="showAnime(${anime.mal_id})">
                    <span class="score-badge"><i class="fas fa-star"></i> ${anime.score || 'N/A'}</span>
                    <img src="${anime.images.jpg.large_image_url}" alt="${anime.title}">
                    <div class="info">
                        <h3>${anime.title}</h3>
                        <p>${anime.type} &bull; ${anime.episodes || '?'} EPS</p>
                    </div>
                </div>
            `).join('');
        }

        async function searchAnime() {
            const q = document.getElementById('anime-search').value;
            if(!q) return;
            const data = await fetchJSON(`${API}/anime?q=${q}&limit=20`);
            
            document.getElementById('landing-view').classList.add('hidden');
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('search-view').classList.remove('hidden');
            document.getElementById('search-title').innerText = `RESULTS FOR: ${q.toUpperCase()}`;
            
            const grid = document.getElementById('search-grid');
            grid.innerHTML = data.data.map(anime => `
                <div class="anime-card" onclick="showAnime(${anime.mal_id})">
                    <span class="score-badge"><i class="fas fa-star"></i> ${anime.score || 'N/A'}</span>
                    <img src="${anime.images.jpg.large_image_url}" alt="${anime.title}">
                    <div class="info">
                        <h3>${anime.title}</h3>
                        <p>${anime.type} &bull; ${anime.episodes || '?'} EPS</p>
                    </div>
                </div>
            `).join('');
        }

        async function showAnime(id) {
            const anime = await fetchJSON(`${API}/anime/${id}/full`);
            const episodes = await fetchJSON(`${API}/anime/${id}/episodes`);
            
            document.getElementById('landing-view').classList.add('hidden');
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('detail-view').style.display = 'block';
            window.scrollTo(0,0);

            const details = document.getElementById('anime-details');
            details.innerHTML = `
                <img src="${anime.data.images.jpg.large_image_url}" class="detail-poster" alt="Poster">
                <div class="detail-info">
                    <h1 style="font-family:'Bangers'; font-size:4rem; margin:0 0 10px;">${anime.data.title}</h1>
                    <p style="color:var(--primary); font-family:'Space Mono'; font-weight:bold; font-size:1.1rem; margin-bottom:25px;">
                        ${anime.data.status} &bull; ${anime.data.type} &bull; ${anime.data.rating}
                    </p>
                    <p style="color:#aaa; line-height:1.8; font-size:1.1rem; margin-bottom:30px;">${anime.data.synopsis}</p>
                    <div style="display:flex; gap:20px;">
                        <div style="background:#111; padding:15px; border-radius:10px; flex:1; text-align:center;">
                            <span style="display:block; color:#666; font-size:0.8rem;">SCORE</span>
                            <span style="font-size:1.5rem; font-weight:bold; color:#FFD700;">${anime.data.score}</span>
                        </div>
                        <div style="background:#111; padding:15px; border-radius:10px; flex:1; text-align:center;">
                            <span style="display:block; color:#666; font-size:0.8rem;">RANK</span>
                            <span style="font-size:1.5rem; font-weight:bold;">#${anime.data.rank}</span>
                        </div>
                    </div>
                </div>
            `;

            const grid = document.getElementById('episodes-grid');
            if(episodes.data && episodes.data.length > 0) {
                grid.innerHTML = episodes.data.map(ep => `
                    <div class="episode-btn" onclick="watchEpisode(${anime.data.mal_id}, ${ep.mal_id}, '${anime.data.title.replace(/'/g, "\\'")}')">
                        EP ${ep.mal_id}
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `<p style="color:#666;">Episode data is being updated. Check back shortly!</p>`;
            }
        }

        function watchEpisode(malId, epNum, title) {
            document.getElementById('watch-overlay').style.display = 'flex';
            document.getElementById('player-title').innerText = title.toUpperCase();
            document.getElementById('ep-indicator').innerText = `EPISODE ${epNum}`;
            
            // Using a high-fidelity universal player integration
            // Note: In a real environment, we would use a more direct HLS source, 
            // but for a Gold Standard UI, we use the most stable provider.
            const playerUrl = `https://vidsrc.to/embed/anime/${malId}/${epNum}`; 
            
            document.getElementById('player-frame').innerHTML = `
                <iframe src="${playerUrl}" allowfullscreen></iframe>
            `;
        }

        function closePlayer() {
            document.getElementById('watch-overlay').style.display = 'none';
            document.getElementById('player-frame').innerHTML = '';
        }

        function showLanding() {
            document.getElementById('search-view').classList.add('hidden');
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('landing-view').classList.remove('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
