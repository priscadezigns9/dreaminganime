<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Hub — Dreaming Anime | The Real-Time Signal</title>
    <link rel="icon" type="image/png" href="https://priscadezigns.org/logos/dreaming-anime-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/da-style.css">
    <style>
        body { background: #000; color: #fff; }
        .hub-hero { padding: 100px 20px; text-align: center; background: radial-gradient(circle at center, #1a0f00 0%, #000 70%); }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .hub-card { background: #111; border: 1px solid #222; border-radius: 20px; overflow: hidden; transition: 0.3s; text-decoration: none; display: block; }
        .hub-card:hover { border-color: #FF6B00; transform: translateY(-5px); box-shadow: 0 10px 40px rgba(255,107,0,0.1); }
        .hub-card img { width: 100%; height: 250px; object-fit: cover; }
        .hub-card-content { padding: 20px; }
        @keyframes pulse {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
          70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255,0,0,0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0); }
        }
    </style>
</head>
<body>

<nav class="empire-nav" style="background: rgba(0,0,0,0.9); border-bottom: 1px solid #222;">
  <a href="/" class="logo" style="display: flex; align-items: center; gap: 10px; text-decoration:none; color:#fff;">
    <img src="https://priscadezigns.org/logos/dreaming-anime-logo.png" alt="Logo" style="height: 32px; width: 32px; border-radius: 50%;">
    PRISCA <span>DEZIGNS</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link" style="color:#fff; text-decoration:none; font-size:0.8rem; margin:0 10px;">Home</a>
    <a href="/cinema/" class="nav-link" style="color:#fff; text-decoration:none; font-size:0.8rem; margin:0 10px;">Cinema</a>
    <a href="/manga/" class="nav-link" style="color:#fff; text-decoration:none; font-size:0.8rem; margin:0 10px;">Vault</a>
  </div>
</nav>

<section class="hub-hero">
    <div style="display:inline-flex; align-items:center; gap:10px; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); padding:8px 16px; border-radius:50px; margin-bottom:20px;">
        <div style="width:8px; height:8px; background:#FF0000; border-radius:50%; animation: pulse 1s infinite;"></div>
        <span style="color:#FF0000; font-family:'Space Mono', monospace; font-size:0.7rem; font-weight:700; letter-spacing:2px;">LIVE TOKYO SIGNAL</span>
    </div>
    <h1 style="font-family:'Bangers', cursive; font-size:5rem; color:#fff; margin-bottom:10px;">THE REAL-TIME HUB.</h1>
    <p style="color:#888; font-family:'Inter', sans-serif; font-size:1.2rem; max-width:700px; margin:0 auto;">Your high-fidelity gateway to the latest broadcasts, news, and seasonal shifts directly from the source.</p>
</section>

<div id="hub-grid" class="hub-grid">
    <p style="text-align:center; grid-column: 1/-1; color:#444;">Connecting to satellites...</p>
</div>

<script>
async function loadHub() {
    const grid = document.getElementById('hub-grid');
    try {
        const r = await fetch('https://api.jikan.moe/v4/seasons/now');
        const d = await r.json();
        grid.innerHTML = '';
        d.data.forEach(a => {
            grid.innerHTML += `
                <a href="${a.url}" target="_blank" class="hub-card">
                    <img src="${a.images.jpg.large_image_url}" alt="${a.title}">
                    <div class="hub-card-content">
                        <span style="color:#FF6B00; font-family:'Space Mono', monospace; font-size:0.7rem; font-weight:700;">BROADCASTING</span>
                        <h3 style="color:#fff; font-family:'Space Grotesk', sans-serif; margin-top:10px; margin-bottom:10px; font-size:1.2rem;">${a.title}</h3>
                        <p style="color:#666; font-size:0.8rem; line-height:1.5;">Score: ${a.score || 'N/A'} | ${a.episodes || '?'} Episodes</p>
                    </div>
                </a>
            `;
        });
    } catch(e) {
        grid.innerHTML = '<p style="color:#888; text-align:center;">Hub sync failed. Retrying...</p>';
    }
}
loadHub();
</script>

<footer style="background:#000; padding:60px 20px; border-top:1px solid #111; text-align:center;">
    <p style="color:#444; font-size:0.8rem;">&copy; 2026 DREAMING ANIME | THE ONE EMPIRE</p>
</footer>

</body>
</html>
