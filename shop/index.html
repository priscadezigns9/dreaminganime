<!DOCTYPE html><html><head><link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"><style>
:root { --orange: #FF6B00; --black: #0A0A0A; --white: #FFFFFF; --grey: #f5f5f5; --border: 3px solid #0A0A0A; } 
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); padding-top: 100px; overflow-x: hidden; } 
.empire-bar { background: #000; color: #FF6B00; padding: 10px; text-align: center; font-size: 11px; z-index: 100001; position: fixed; top: 0; left: 0; width: 100%; height: 32px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; } 
nav { position: fixed; top: 32px; left: 0; right: 0; z-index: 1000; background: #FFFFFF; border-bottom: 2px solid #0A0A0A; padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; } 
.nav-brand { font-family: 'Bangers', cursive; font-size: 1.7rem; color: #FF6B00; text-decoration: none; display: flex; align-items: center; gap: 8px; } 
.mimi-header { position: absolute; top: -80px; right: 5%; width: 220px; z-index: 100; pointer-events: none; } 
.hero { padding: 80px 6%; position: relative; border-bottom: var(--border); background: var(--white); text-align: center; overflow: hidden; } 
.hero h1 { font-family: 'Bangers', cursive; font-size: 5rem; line-height: 0.9; letter-spacing: 2px; } 
.filter-wrap { position: sticky; top: 96px; z-index: 999; background: #fff; border-bottom: var(--border); padding: 15px 6%; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; } 
.filter-btn { font-family: 'Bangers', cursive; border: 2px solid #000; background: #fff; padding: 8px 20px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; white-space: nowrap; }
.filter-btn.active { background: var(--orange); color: #fff; transform: translateY(-3px); box-shadow: 4px 4px 0 #000; }
.shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0; background: #000; border-bottom: var(--border); }
.card { background: #fff; border: 1px solid #000; padding: 25px; display: flex; flex-direction: column; }
.card-image { height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.card-image img { max-width: 90%; max-height: 90%; object-fit: contain; }
.card-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.1rem; margin-bottom: 15px; }
.shop-btn { font-family: 'Bangers', cursive; background: #000; color: #fff; padding: 10px 20px; text-decoration: none; text-align: center; }
</style></head><body><div class="empire-bar">EMPIRE MANDATE: 10% OF EVERY PURCHASE SUPPORTS THE MISSION.</div><nav><a class="nav-brand" href="/"><span>DREAMING</span><span style="color:#000">ANIME</span></a></nav><main><section class="hero"><img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_3.webp" class="mimi-header" alt="Mimi"><h1>LIVE THE<br><span style="color:#FF6B00">ANIME</span> LIFE.</h1></section><div class="filter-wrap"><button class="filter-btn active">ALL DROPS</button></div><section class="shop-grid"></section></main></body></html>
