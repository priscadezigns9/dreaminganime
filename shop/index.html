<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | DREAMING ANIME</title>
    <link rel="icon" type="image/png" href="https://priscadezigns.org/logos/dreaming-anime-logo.png">
    
    <!-- High-Fidelity Infrastructure -->
    <link rel="preconnnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #FF6B00;
            --accent: #FFD700;
            --bg: #0A0A0A;
            --card-bg: #1A1A1A;
            --text: #FFFFFF;
            --font-heading: 'Bangers', cursive;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        nav { background: rgba(10, 10, 10, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-family: var(--font-heading); font-size: 2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }

        header { text-align: center; margin-bottom: 40px; }
        .mimi-banner { margin-bottom: 20px; }
        h1 { font-family: var(--font-heading); font-size: clamp(2.5rem, 8vw, 4rem); text-transform: uppercase; margin-bottom: 10px; color: var(--primary); letter-spacing: 3px; }
        .sub { font-size: 1rem; color: #888; font-weight: 700; letter-spacing: 2px; }

        .filters { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            justify-content: center; 
            margin-bottom: 40px; 
            padding: 10px;
        }
        
        .filter-pill { 
            padding: 8px 20px; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,107,0,0.2); 
            border-radius: 50px; 
            font-weight: 800; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: 0.2s; 
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        
        .filter-pill.active, .filter-pill:hover { 
            background: var(--primary); 
            border-color: var(--primary); 
            color: #000; 
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .filters { 
                flex-wrap: nowrap; 
                overflow-x: auto; 
                justify-content: flex-start; 
                padding-bottom: 15px;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }
            .filters::-webkit-scrollbar { display: none; }
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(255,107,0,0.15); }

        .img-container { height: 320px; background: #111; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .product-card:hover .img-container img { transform: scale(1.08); }

        .card-content { padding: 20px; }
        .product-cat { color: var(--primary); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .product-title { font-weight: 700; font-size: 1rem; margin-bottom: 15px; height: 45px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .price-buy { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .price { font-size: 1.25rem; font-weight: 900; color: var(--accent); }
        .buy-btn { background: var(--primary); color: #000; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s; }
        .buy-btn:hover { background: var(--accent); transform: scale(1.05); }

        #loading-state { text-align: center; padding: 80px; font-size: 1.5rem; font-family: var(--font-heading); color: var(--primary); }

        @media (max-width: 480px) {
            .product-grid { grid-template-columns: 1fr; }
            .img-container { height: 400px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo" style="display: flex; align-items: center; gap: 10px;">
            <img src="https://priscadezigns.org/logos/dreaming-anime-logo.png" alt="Logo" style="height: 40px; width: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
            DREAMING ANIME
        </div>
        <div class="nav-links" style="display: flex; gap: 20px; align-items: center;">
            <a href="/" style="display: flex; align-items: center; gap: 8px; color: var(--text); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s;">
                <i data-lucide="home" style="color:var(--primary); width:18px;"></i>
                HOME
            </a>
            <a href="https://www.redbubble.com/shop/ap/dreaming-anime" target="_blank" rel="noopener noreferrer" style="display: flex; align-items: center; gap: 8px; color: var(--text); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s;">
                <i data-lucide="shopping-bag" style="color:var(--primary); width:18px;"></i>
                MERCH
            </a>
        </div>
    </nav>

    <div class="container">
        <header>
            <div class="mimi-banner">
                <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_shop_header.webp" alt="Mimi Official" style="width:100%; max-width:350px; height:auto; filter:drop-shadow(0 0 20px rgba(255,107,0,0.3));">
            </div>
            <h1>The Otaku Vault</h1>
            <div class="sub">CURATED HIGH-FIDELITY ESSENTIALS</div>
        </header>

        <div class="filters" id="filters">
            <div class="filter-pill active" onclick="filterBy('All', event)">ALL</div>
            <div class="filter-pill" onclick="filterBy('Figures', event)">FIGURES</div>
            <div class="filter-pill" onclick="filterBy('Cups & Mugs', event)">CUPS & MUGS</div>
            <div class="filter-pill" onclick="filterBy('Hoodies & Apparel', event)">HOODIES</div>
            <div class="filter-pill" onclick="filterBy('Stickers', event)">STICKERS</div>
            <div class="filter-pill" onclick="filterBy('Keychains', event)">KEYCHAINS</div>
            <div class="filter-pill" onclick="filterBy('Bags & Wallets', event)">BAGS</div>
            <div class="filter-pill" onclick="filterBy('Rugs & Mats', event)">RUGS & MATS</div>
            <div class="filter-pill" onclick="filterBy('Cosplay & Wigs', event)">COSPLAY</div>
            <div class="filter-pill" onclick="filterBy('Jewelry & Hats', event)">JEWELRY & HATS</div>
            <div class="filter-pill" onclick="filterBy('Manga & Books', event)">MANGA</div>
        </div>

        <div id="loading-state">SYNCHRONIZING WITH VAULT...</div>
        <div class="product-grid" id="product-grid" style="display:none;"></div>
    </div>

    <script>
        const supabaseUrl = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const supabaseKey = 'sb_publishable_UicuMabi1dRKAvQ4YGiakg_NCMnftfS';
        
        // Correct Supabase Client Initialization
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let allProducts = [];

        async function loadShop() {
            try {
                // High-Speed First Paint: Fetch initial 24 items
                const { data, error } = await _supabase
                    .from('da_inventory')
                    .select('*')
                    .range(0, 23);

                if (error) throw error;
                allProducts = data;
                renderProducts(allProducts);
                
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('product-grid').style.display = 'grid';

                // Background Sync: Fetch the remaining 376 items silently
                const { data: remaining } = await _supabase
                    .from('da_inventory')
                    .select('*')
                    .range(24, 399);
                
                if (remaining) {
                    allProducts = [...allProducts, ...remaining];
                }
            } catch (e) {
                console.error('Vault sync error:', e);
                document.getElementById('loading-state').innerText = 'VAULT SYNC ERROR - CHECK CONSOLE';
            }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card">
                    <div class="img-container">
                        <img src="${p.image_url}" alt="${p.title}" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/400?text=Image+Loading...'">
                    </div>
                    <div class="card-content">
                        <div class="product-cat">${p.category}</div>
                        <div class="product-title">${p.title}</div>
                        <div class="price-buy">
                            <div class="price">${p.price}</div>
                            <a href="${p.affiliate_link}" target="_blank" class="buy-btn">SECURE ORDER</a>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterBy(cat, event) {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            
            if (cat === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                renderProducts(filtered);
            }
        }

        window.onload = loadShop;
    </script>
</body>
</html>
