<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | DREAMING ANIME</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/dreaming-anime-logo.png">
    
    <!-- High-Fidelity Infrastructure -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #FF6B00;
            --accent: #FFD700;
            --bg: #0A0A0A;
            --card-bg: #1A1A1A;
            --text: #FFFFFF;
            --font-heading: 'Bangers', cursive;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navigation */
        nav { background: rgba(10, 10, 10, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-brand span { font-family: var(--font-heading); font-size: 2rem; color: var(--primary); letter-spacing: 1px; }

        /* Shop Container */
        .shop-container { max-width: 1400px; margin: 0 auto; padding: 40px 5%; }
        .shop-header { margin-bottom: 40px; text-align: center; }
        .shop-header h1 { font-family: var(--font-heading); font-size: 4rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .shop-header p { font-size: 1.1rem; opacity: 0.8; letter-spacing: 1px; }

        /* Filter Pills */
        .filters { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; margin-bottom: 30px; scrollbar-width: none; }
        .filter-pill { padding: 10px 25px; background: var(--card-bg); border: 1px solid rgba(255,107,0,0.3); border-radius: 50px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-pill.active, .filter-pill:hover { background: var(--primary); border-color: var(--primary); }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .product-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(255,107,0,0.2); }
        
        .img-container { width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-cat { font-size: 0.75rem; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .product-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 3.1rem; }
        
        .price-buy { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
        .buy-btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 0.9rem; transition: 0.3s; }
        .buy-btn:hover { background: white; color: var(--primary); }

        /* Empty State */
        #loading-state { text-align: center; padding: 100px 0; font-family: var(--font-heading); font-size: 2rem; color: var(--primary); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">
            <img src="https://raw.githubusercontent.com/priscadezigns9/priscadezignswebsite/main/logos/dreaming-anime-logo.png" style="height:40px;">
            <span>DREAMING ANIME</span>
        </a>
    </nav>

    <div class="shop-container">
        <!-- Mimi High-Fidelity Presence -->
        <div style="display:flex; justify-content:center; margin-bottom: 20px;">
            <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_shop_header.webp" alt="Mimi Official" style="width:100%; max-width:400px; height:auto; filter:drop-shadow(0 0 20px rgba(255,107,0,0.4));">
        </div>

        <div class="shop-header">
            <h1>LEGENDARY GEAR</h1>
            <p>HIGH-FIDELITY ANIME COLLECTIBLES & FIGURES</p>
        </div>

        <div class="filters" id="filters">
            <div class="filter-pill active" onclick="filterBy('All')">ALL ITEMS</div>
            <div class="filter-pill" onclick="filterBy('Demon Slayer')">DEMON SLAYER</div>
            <div class="filter-pill" onclick="filterBy('Jujutsu Kaisen')">JUJUTSU KAISEN</div>
            <div class="filter-pill" onclick="filterBy('One Piece')">ONE PIECE</div>
            <div class="filter-pill" onclick="filterBy('Statues')">STATUES</div>
        </div>

        <div id="loading-state">SYNCHRONIZING NEURAL INVENTORY...</div>
        <div class="product-grid" id="product-grid" style="display:none;">
            <!-- Dynamic Products -->
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://sktpjacowqaedddtrhuz.supabase.co', 'sb_publishable_ChdrHQEJV7pVpJMKt-ZaUw_6V0WRKAR');
        let allProducts = [];

        async function loadShop() {
            try {
                const { data, error } = await sb.from('da_inventory').select('*').order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Supabase Error:', error);
                    document.getElementById('loading-state').innerHTML = `SYNC ERROR: ${error.message}`;
                    return;
                }
                
                if (!data || data.length === 0) {
                    console.log('No data found in Supabase.');
                    document.getElementById('loading-state').innerHTML = 'NO GEAR FOUND IN NEURAL ARCHIVE.';
                    return;
                }
                
                allProducts = data;
                
                renderProducts(allProducts);
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('product-grid').style.display = 'grid';
            } catch (e) {
                console.error('Shop sync error:', e);
            }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card" data-category="${p.category}">
                    <div class="img-container">
                        <img src="${p.image_url}" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400?text=Image+Loading...'">
                    </div>
                    <div class="card-content">
                        <div class="product-cat">${p.category}</div>
                        <div class="product-title">${p.title}</div>
                        <div class="price-buy">
                            <div class="price">${p.price}</div>
                            <a href="${p.affiliate_link}" target="_blank" class="buy-btn">SECURE ORDER</a>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterBy(cat) {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            
            if (cat === 'All') renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.category === cat));
        }

        loadShop();
    </script>
</body>
</html>
