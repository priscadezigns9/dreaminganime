        function render(cat) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            data.forEach(p => {
                const pcat = p.category.toLowerCase();
                if (cat === 'all' || pcat.includes(cat)) {
                    grid.innerHTML += `<div class="card">
                        <div class="card-image"><img src="${p.image_url}" loading="lazy"></div>
                        <h3 class="card-title">${p.title}</h3>
                        <div class="card-footer"><span class="price-sim">${p.price}</span><a href="${p.affiliate_link}" class="shop-btn" target="_blank">SHOP</a></div>
                    </div>`;
                }
            });
        }
        function f(c, b) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            render(c);
        }
        render('all');
    </script>
