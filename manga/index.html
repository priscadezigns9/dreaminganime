<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>THE VAULT | DREAMING ANIME</title> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"> <style> :root { --primary: #FF6B00; --bg: #000; } body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; -webkit-tap-highlight-color: transparent; } nav { padding: 12px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); } .logo { font-family:'Bangers'; font-size:1.5rem; color:var(--primary); text-decoration:none; } .header { text-align:center; padding:40px 5%; border-bottom: 1px solid #111; background: linear-gradient(to bottom, #050505, #000); } .header h1 { font-family:'Bangers'; font-size:clamp(3rem, 10vw, 5rem); margin:0; line-height:1; } .header p { color:var(--primary); font-family:'Space Mono'; letter-spacing:2px; font-size:0.7rem; margin-top:10px; } .search-wrap { padding: 20px 5%; max-width: 600px; margin: 0 auto; position: relative; } .search-wrap input { width: 100%; background: #111; border: 1px solid #333; padding: 12px 20px; border-radius: 30px; color: #fff; font-family: 'Space Mono'; outline: none; box-sizing: border-box; } .search-wrap i { position: absolute; right: 8%; top: 50%; transform: translateY(-50%); color: var(--primary); } .section-header { padding: 20px 5% 0; font-family:'Bangers'; color:var(--primary); font-size: 1.1rem; } .grid { display:flex; overflow-x: auto; gap:12px; padding:15px 5% 30px; scrollbar-width: none; -webkit-overflow-scrolling: touch; } .grid::-webkit-scrollbar { display: none; } .card { flex:0 0 140px; height:200px; background:#111; border-radius:6px; overflow:hidden; border:1px solid #222; transition:0.2s; cursor:pointer; position:relative; } @media (min-width: 768px) { .card { flex:0 0 180px; height:260px; } } .card:active { transform: scale(0.96); } .card img { width:100%; height:100%; object-fit:cover; } .tag { position:absolute; bottom:8px; right:8px; background:var(--primary); color:#000; padding:2px 8px; border-radius:4px; font-size:.6rem; font-weight:900; } .loader { width: 30px; height: 30px; border: 3px solid #111; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; } @keyframes spin { 0% { transform: translate(-50%,-50%) rotate(0deg); } 100% { transform: translate(-50%,-50%) rotate(360deg); } } #search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 20px 5%; display: none; } </style> </head> <body> <nav><a href="/" class="logo">THE VAULT</a><a href="/index.html" style="color:#fff; text-decoration:none; font-weight:700; font-size:0.8rem;">HOME</a></nav> <div class="header"> <h1>Mimi's Collection</h1> <p>INTERNAL MANGA REPOSITORY</p> </div> <div class="search-wrap"> <input type="text" id="q" placeholder="SEARCH MANGA..." onkeypress="if(event.key==='Enter')search()"> <i class="fas fa-search" onclick="search()"></i> </div> <div id="search-results"></div> <div id="l"></div> <script> const API = "https://api.jikan.moe/v4"; const CATS = [ {n:"Trending Manga", q:"/top/manga?filter=bypopularity"}, {n:"Shonen Jump Hits", q:"/manga?producers=434"}, {n:"Must Read Classics", q:"/manga?order_by=rank&sort=asc"} ]; async function init(){ const l=document.getElementById('l'); for(let c of CATS){ try { const r=await fetch(API+c.q+"&limit=12"); const d=await r.json(); if(!d || !d.data) continue; const s=document.createElement('div'); s.innerHTML=`<div class="section-header"><h2>${c.n}</h2></div><div class="grid">${d.data.map(m=>`<div class="card" onclick="read('${m.title.replace(/'/g,"")}')"><img src="${m.images.jpg.large_image_url}" loading="lazy"><div class="tag">READ</div></div>`).join('')}</div>`; l.appendChild(s); await new Promise(r => setTimeout(r, 400)); } catch(e) { console.error(e); } } } async function search(){ const q = document.getElementById('q').value; if(!q) return; const res = document.getElementById('search-results'); const l = document.getElementById('l'); l.style.display = 'none'; res.style.display = 'grid'; res.innerHTML = '<div class="loader"></div>'; try { const r = await fetch(API+"/manga?q="+q+"&limit=24"); const d = await r.json(); if(!d || !d.data || d.data.length === 0) { res.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px;">No results found.</div>'; return; } res.innerHTML = d.data.map(m=>`<div class="card" onclick="read('${m.title.replace(/'/g,"")}')"><img src="${m.images.jpg.large_image_url}"><div class="tag">READ</div></div>`).join(''); } catch(e) { res.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px;">Error fetching data.</div>'; } } async function read(t){ const l = document.createElement("div"); l.className = "loader"; l.style.cssText = "position:fixed;top:50%;left:50%;z-index:2000;"; document.body.appendChild(l); try { const r = await fetch("https://api.mangadex.org/manga?title=" + encodeURIComponent(t) + "&limit=1"); const d = await r.json(); if(d.data && d.data.length > 0) { window.open("https://mangadex.org/title/" + d.data[0].id, "_blank"); } else { window.open("https://mangadex.org/search?q=" + encodeURIComponent(t), "_blank"); } } catch(e) { window.open("https://mangadex.org/search?q=" + encodeURIComponent(t), "_blank"); } finally { l.remove(); } } init(); </script> </body> </html>
