<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | DREAMING ANIME</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #0A0A0A; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        nav { padding: 20px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-family:'Bangers', cursive; font-size:1.5rem; }
        .logo img { height:35px; border-radius:50%; border: 1px solid var(--primary); }
        .vault-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:30px; padding:60px 5%; }
        .manga-card { background:#111; border-radius:12px; overflow:hidden; border:1px solid #222; text-decoration:none; transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .manga-card:hover { transform:translateY(-10px); border-color:var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .manga-img { width:100%; height:320px; object-fit:cover; transition: 0.5s; }
        .manga-card:hover .manga-img { transform: scale(1.05); }
        .card-body { padding:20px; }
        .card-body h3 { font-family:'Bangers', cursive; font-size:1.4rem; margin-bottom:8px; color:#fff; line-height: 1.1; }
        .card-body p { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
        .score { color:var(--primary); font-family:'Space Mono'; font-weight:700; font-size:0.9rem; border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .live-tag { position: absolute; top: 15px; right: 15px; background: var(--primary); color: #000; padding: 4px 10px; font-family: 'Space Mono'; font-weight: 700; font-size: 0.65rem; border-radius: 4px; z-index: 10; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo"><img src="/logos/dreaming-anime-logo-round.png"> DREAMING ANIME</a>
        <a href="/" style="color:#888; text-decoration:none; font-weight:700; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">&larr; BACK TO HUB</a>
    </nav>
    <div style="text-align:center; padding:80px 20px 20px;">
        <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_shop_header.webp" style="height:180px; filter:drop-shadow(0 0 30px rgba(255,107,0,0.3));" alt="Mimi Vault">
        <h1 style="font-family:'Bangers',cursive; font-size:5rem; line-height: 1;">THE MANGA VAULT</h1>
        <p style="font-family:'Space Mono'; color:var(--primary); letter-spacing: 2px;">CHAPTER 05 &mdash; REAL-TIME DATA ARCHIVE</p>
    </div>
    
    <div id="manga-grid" class="vault-grid">
        <!-- API Data will load here -->
    </div>

    <script>
        async function loadMangaVault() {
            const grid = document.getElementById('manga-grid');
            try {
                // Fetch top trending manga from Jikan API
                const res = await fetch('https://api.jikan.moe/v4/top/manga?limit=24');
                const data = await res.json();
                
                grid.innerHTML = ''; // Clear loading state
                
                data.data.forEach(manga => {
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    card.innerHTML = `
                        <span class="live-tag">SYNCED</span>
                        <img src="${manga.images.jpg.large_image_url}" class="manga-img" alt="${manga.title}">
                        <div class="card-body">
                            <h3>${manga.title}</h3>
                            <p>${manga.type} &mdash; ${manga.status}</p>
                            <span class="score">RANK #${manga.rank}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error("Manga API Sync Error:", e);
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Vault connection delayed...</p>';
            }
        }
        window.onload = loadMangaVault;
    </script>
</body>
</html>
