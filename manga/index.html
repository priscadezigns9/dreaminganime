<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | DREAMING ANIME</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #0A0A0A; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        nav { padding: 20px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-family:'Bangers', cursive; font-size:1.5rem; }
        .logo img { height:35px; border-radius:50%; border: 1px solid var(--primary); }
        .vault-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:30px; padding:60px 5%; }
        .manga-card { background:#111; border-radius:12px; overflow:hidden; border:1px solid #222; text-decoration:none; transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; cursor: pointer; }
        .manga-card:hover { transform:translateY(-10px); border-color:var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .manga-img { width:100%; height:320px; object-fit:cover; transition: 0.5s; }
        .manga-card:hover .manga-img { transform: scale(1.05); }
        .card-body { padding:20px; }
        .card-body h3 { font-family:'Bangers', cursive; font-size:1.4rem; margin-bottom:8px; color:#fff; line-height: 1.1; }
        .card-body p { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
        .score { color:var(--primary); font-family:'Space Mono'; font-weight:700; font-size:0.9rem; border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .live-tag { position: absolute; top: 15px; right: 15px; background: var(--primary); color: #000; padding: 4px 10px; font-family: 'Space Mono'; font-weight: 700; font-size: 0.65rem; border-radius: 4px; z-index: 10; }
        
        /* Reader Modal */
        #reader-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }
        #reader-modal.active { display: flex; }
        
        .reader-header {
            height: 60px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        
        .reader-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chapter-select {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            outline: none;
        }

        .nav-btn {
            background: rgba(255,107,0,0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .nav-btn:hover:not(:disabled) { background: var(--primary); color: #000; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .close-reader {
            color: var(--primary);
            font-size: 0.9rem;
            cursor: pointer;
            background: rgba(255,107,0,0.1);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 4px;
            font-family: 'Space Mono';
            font-weight: 700;
            transition: 0.3s;
        }
        .close-reader:hover { background: var(--primary); color: #000; }
        
        #reader-content {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            scroll-behavior: smooth;
        }
        
        .manga-page {
            max-width: 100%;
            height: auto;
            margin-bottom: 0;
            display: block;
        }

        .loading-progress {
            position: fixed;
            top: 60px;
            left: 0;
            height: 3px;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
            z-index: 2001;
        }
        
        .loader-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .loader { 
            width: 50px; height: 50px; 
            border: 4px solid #111; 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
            position: relative;
        }
        .search-container input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            padding: 15px 25px;
            border-radius: 30px;
            color: #fff;
            font-family: 'Space Mono';
            outline: none;
            transition: 0.3s;
        }
        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255,107,0,0.2);
        }
        .search-container i {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo"><img src="/logos/dreaming-anime-logo-round.png"> DREAMING ANIME</a>
        <a href="/" style="color:#888; text-decoration:none; font-weight:700; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">&larr; BACK TO HUB</a>
    </nav>
    <div style="text-align:center; padding:80px 20px 20px;">
        <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_shop_header.webp" style="height:180px; filter:drop-shadow(0 0 30px rgba(255,107,0,0.3));" alt="Mimi Vault">
        <h1 style="font-family:'Bangers',cursive; font-size:5rem; line-height: 1; margin: 10px 0;">THE MANGA VAULT</h1>
        <p style="font-family:'Space Mono'; color:var(--primary); letter-spacing: 2px;">SOVEREIGN READ PROTOCOL &mdash; v2.0</p>
    </div>

    <div class="search-container">
        <input type="text" id="manga-search" placeholder="SEARCH ARCHIVE..." onkeypress="if(event.key==='Enter')searchManga()">
        <i class="fas fa-search"></i>
    </div>
    
    <div id="manga-grid" class="vault-grid">
        <!-- API Data will load here -->
    </div>

    <!-- Reader Modal -->
    <div id="reader-modal">
        <div id="loading-bar" class="loading-progress"></div>
        <div class="reader-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="reader-title" style="font-family:'Bangers'; font-size:1.2rem; color: #fff; letter-spacing: 1px;">READING...</span>
                <div class="reader-controls" id="reader-controls" style="display: none;">
                    <button class="nav-btn" id="prev-ch" onclick="changeChapter(-1)">PREV</button>
                    <select class="chapter-select" id="chapter-select" onchange="loadChapter(this.value)"></select>
                    <button class="nav-btn" id="next-ch" onclick="changeChapter(1)">NEXT</button>
                </div>
            </div>
            <button class="close-reader" onclick="closeReader()">[ CLOSE ]</button>
        </div>
        
        <div id="reader-content">
            <div id="reader-loader" class="loader-container">
                <div class="loader"></div>
                <p style="font-family:'Space Mono'; color:var(--primary); margin-top:20px; font-size: 0.8rem;">INITIATING DIRECT-READ PROTOCOL...</p>
            </div>
            <!-- Images will be injected here -->
        </div>
    </div>

    <script>
        const JIKAN_API = 'https://api.jikan.moe/v4';
        const MD_API = 'https://api.mangadex.org';
        const MD_IMAGE_SERVER = 'https://uploads.mangadex.org';

        let currentMangaId = null;
        let chapters = [];
        let currentChapterIndex = -1;

        async function loadMangaVault() {
            const grid = document.getElementById('manga-grid');
            try {
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Syncing with neural network...</p>';
                const res = await fetch(`${JIKAN_API}/top/manga?limit=24&filter=bypopularity`);
                const data = await res.json();
                renderManga(data.data);
            } catch (e) {
                console.error("Manga API Sync Error:", e);
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Vault connection delayed...</p>';
            }
        }

        async function searchManga() {
            const q = document.getElementById('manga-search').value;
            if(!q) return;
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = '<div class="loader" style="grid-column: 1/-1; margin: 40px auto;"></div>';
            
            try {
                const res = await fetch(`${JIKAN_API}/manga?q=${encodeURIComponent(q)}&limit=24`);
                const data = await res.json();
                if(data.data.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">No records found for that query.</p>';
                    return;
                }
                renderManga(data.data);
            } catch (e) {
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Search failed. Try again.</p>';
            }
        }

        function renderManga(mangas) {
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = '';
            mangas.forEach(manga => {
                const card = document.createElement('div');
                card.className = 'manga-card';
                card.onclick = () => read(manga.title, manga.mal_id);
                card.innerHTML = `
                    <span class="live-tag">SYNCED</span>
                    <img src="${manga.images.jpg.large_image_url}" class="manga-img" alt="${manga.title}">
                    <div class="card-body">
                        <h3>${manga.title}</h3>
                        <p>${manga.type || 'Manga'} &mdash; ${manga.status}</p>
                        <span class="score">RANK #${manga.rank || 'N/A'}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function read(title, malId) {
            const modal = document.getElementById('reader-modal');
            const rTitle = document.getElementById('reader-title');
            const loader = document.getElementById('reader-loader');
            const content = document.getElementById('reader-content');
            const controls = document.getElementById('reader-controls');
            
            modal.classList.add('active');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            rTitle.innerText = `INITIALIZING: ${title.toUpperCase()}`;
            content.querySelectorAll('.manga-page').forEach(img => img.remove());
            loader.style.display = 'block';
            loader.innerHTML = `<div class="loader"></div><p style="font-family:'Space Mono'; color:var(--primary); margin-top:20px; font-size: 0.8rem;">INITIATING DIRECT-READ PROTOCOL...</p>`;
            controls.style.display = 'none';

            try {
                let mangaDexData = null;
                
                // 1. Precise MAL ID lookup
                if (malId) {
                    try {
                        const malRes = await fetch(`${MD_API}/manga?links[mal]=${malId}&limit=1`);
                        const malData = await malRes.json();
                        if (malData.data && malData.data.length > 0) {
                            mangaDexData = malData.data[0];
                        }
                    } catch (e) { console.error("MAL ID lookup failed", e); }
                }
                
                // 2. Fallback to Title Search
                if (!mangaDexData) {
                    const searchRes = await fetch(`${MD_API}/manga?title=${encodeURIComponent(title)}&limit=1&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica`);
                    const searchData = await searchRes.json();
                    if (searchData.data && searchData.data.length > 0) {
                        mangaDexData = searchData.data[0];
                    }
                }
                
                if (!mangaDexData) throw new Error("Manga Not Found on MangaDex");
                
                currentMangaId = mangaDexData.id;
                
                // 3. Fetch all English chapters
                await fetchChapters();
                
                if (chapters.length === 0) {
                    throw new Error("No English chapters found");
                }

                // 4. Load the first chapter
                currentChapterIndex = 0;
                loadChapter(chapters[0].id);
                
            } catch (err) {
                console.error("Reader Error:", err);
                loader.innerHTML = `
                    <p style="color: var(--primary); font-family: 'Space Mono';">${err.message.toUpperCase()}</p>
                    <button class="nav-btn" style="margin-top: 20px;" onclick="window.open('https://mangadex.org/search?q=${encodeURIComponent(title)}')">TRY ON MANGADEX</button>
                `;
            }
        }

        async function fetchChapters() {
            let allChapters = [];
            let offset = 0;
            let total = 1;

            while (offset < total) {
                const res = await fetch(`${MD_API}/manga/${currentMangaId}/feed?translatedLanguage[]=en&order[chapter]=asc&limit=500&offset=${offset}&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica&contentRating[]=pornographic`);
                const data = await res.json();
                allChapters = allChapters.concat(data.data);
                total = data.total;
                offset += 500;
            }

            // Filter out external chapters and duplicates, sort by chapter number
            chapters = allChapters
                .filter(ch => ch.attributes.pages > 0)
                .map(ch => ({
                    id: ch.id,
                    chapter: ch.attributes.chapter,
                    title: ch.attributes.title || `Chapter ${ch.attributes.chapter}`
                }))
                .filter((v, i, a) => a.findIndex(t => (t.chapter === v.chapter)) === i);

            updateChapterSelect();
        }

        function updateChapterSelect() {
            const select = document.getElementById('chapter-select');
            select.innerHTML = '';
            chapters.forEach((ch, index) => {
                const opt = document.createElement('option');
                opt.value = ch.id;
                opt.innerText = `Ch. ${ch.chapter}: ${ch.title}`;
                if (index === currentChapterIndex) opt.selected = true;
                select.appendChild(opt);
            });
        }

        async function loadChapter(chapterId) {
            const loader = document.getElementById('reader-loader');
            const content = document.getElementById('reader-content');
            const controls = document.getElementById('reader-controls');
            const loadingBar = document.getElementById('loading-bar');
            
            currentChapterIndex = chapters.findIndex(ch => ch.id === chapterId);
            updateChapterSelect();
            
            loader.style.display = 'block';
            loader.innerHTML = `<div class="loader"></div><p style="font-family:'Space Mono'; color:var(--primary); margin-top:20px; font-size: 0.8rem;">FETCHING PAGES FROM MANGADEX...</p>`;
            controls.style.display = 'flex';
            content.querySelectorAll('.manga-page').forEach(img => img.remove());
            loadingBar.style.width = '0%';

            document.getElementById('prev-ch').disabled = currentChapterIndex <= 0;
            document.getElementById('next-ch').disabled = currentChapterIndex >= chapters.length - 1;

            try {
                const res = await fetch(`${MD_API}/at-home/server/${chapterId}`);
                if (!res.ok) throw new Error("Chapter Fetch Error");
                const data = await res.json();
                const baseUrl = data.baseUrl;
                const hash = data.chapter.hash;
                const pages = data.chapter.data;

                if (!pages || pages.length === 0) throw new Error("No pages found in chapter");

                let loadedCount = 0;
                pages.forEach((page, index) => {
                    const img = document.createElement('img');
                    img.className = 'manga-page';
                    img.src = `${baseUrl}/data/${hash}/${page}`;
                    img.referrerPolicy = "no-referrer";
                    img.loading = 'lazy';
                    img.onload = () => {
                        loadedCount++;
                        loadingBar.style.width = `${(loadedCount / pages.length) * 100}%`;
                        if (loadedCount === pages.length) {
                            setTimeout(() => loadingBar.style.width = '0%', 500);
                        }
                    };
                    content.appendChild(img);
                });

                loader.style.display = 'none';
                content.scrollTop = 0;

            } catch (err) {
                console.error("Chapter Load Error:", err);
                loader.innerHTML = `
                    <p style="color: var(--primary); font-family: 'Space Mono';">${err.message.toUpperCase()}</p>
                    <button class="nav-btn" style="margin-top: 20px;" onclick="location.reload()">RELOAD SYSTEM</button>
                `;
            }
        }

        function changeChapter(delta) {
            const newIndex = currentChapterIndex + delta;
            if (newIndex >= 0 && newIndex < chapters.length) {
                loadChapter(chapters[newIndex].id);
            }
        }

        function closeReader() {
            const modal = document.getElementById('reader-modal');
            modal.classList.remove('active');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            const content = document.getElementById('reader-content');
            content.querySelectorAll('.manga-page').forEach(img => img.remove());
            document.getElementById('reader-loader').innerHTML = '';
        }

        window.onload = loadMangaVault;
    </script>
</body>
</html>
