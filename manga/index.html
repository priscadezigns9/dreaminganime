<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | DREAMING ANIME</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #0A0A0A; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; }
        nav { padding: 20px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-family:'Bangers', cursive; font-size:1.5rem; }
        .logo img { height:35px; border-radius:50%; }
        .vault-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:30px; padding:100px 5%; }
        .manga-card { background:#111; border-radius:12px; overflow:hidden; border:1px solid #222; text-decoration:none; transition:0.3s; }
        .manga-card:hover { transform:translateY(-10px); border-color:var(--primary); }
        .manga-img { width:100%; height:350px; object-fit:cover; }
        .card-body { padding:25px; }
        .card-body h3 { font-family:'Bangers', cursive; font-size:1.8rem; margin-bottom:10px; color:#fff; }
        .price { color:var(--primary); font-family:'Space Mono'; font-weight:700; font-size:1.2rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo"><img src="/logos/dreaming-anime-logo-round.png"> DREAMING ANIME</a>
        <a href="/" style="color:#888; text-decoration:none; font-weight:700; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">&larr; BACK TO HUB</a>
    </nav>
    <div style="text-align:center; padding-top:100px;">
        <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_shop_header.webp" style="height:200px; filter:drop-shadow(0 0 30px rgba(255,107,0,0.3));">
        <h1 style="font-family:'Bangers',cursive; font-size:5rem;">THE MANGA VAULT</h1>
        <p style="font-family:'Space Mono'; color:var(--primary);">CHAPTER 05 &mdash; THE COLLECTION</p>
    </div>
    <div class="vault-grid">
        <div class="manga-card">
            <img src="https://priscadezigns.org/logos/dreaming-anime-logo.png" class="manga-img">
            <div class="card-body">
                <h3>SOLO LEVELING VOL. 1</h3>
                <p class="price">$19.99</p>
            </div>
        </div>
        <div class="manga-card">
            <img src="https://priscadezigns.org/logos/dreaming-anime-logo.png" class="manga-img">
            <div class="card-body">
                <h3>JUJUTSU KAISEN 0</h3>
                <p class="price">$15.99</p>
            </div>
        </div>
        <div class="manga-card">
            <img src="https://priscadezigns.org/logos/dreaming-anime-logo.png" class="manga-img">
            <div class="card-body">
                <h3>BERSERK DELUXE VOL. 1</h3>
                <p class="price">$49.99</p>
            </div>
        </div>
    </div>
</body>
</html>
