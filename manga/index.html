<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | DREAMING ANIME</title>
    <link rel="icon" type="image/png" href="/logos/dreaming-anime-logo-round.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #0A0A0A; }
        body { margin:0; background:var(--bg); color:#fff; font-family:'Inter', sans-serif; overflow-x: hidden; }
        nav { padding: 20px 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:#fff; font-family:'Bangers', cursive; font-size:1.5rem; }
        .logo img { height:35px; border-radius:50%; border: 1px solid var(--primary); }
        .vault-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:30px; padding:60px 5%; }
        .manga-card { background:#111; border-radius:12px; overflow:hidden; border:1px solid #222; text-decoration:none; transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; cursor: pointer; }
        .manga-card:hover { transform:translateY(-10px); border-color:var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .manga-img { width:100%; height:320px; object-fit:cover; transition: 0.5s; }
        .manga-card:hover .manga-img { transform: scale(1.05); }
        .card-body { padding:20px; }
        .card-body h3 { font-family:'Bangers', cursive; font-size:1.4rem; margin-bottom:8px; color:#fff; line-height: 1.1; }
        .card-body p { color: #888; font-size: 0.85rem; margin-bottom: 12px; }
        .score { color:var(--primary); font-family:'Space Mono'; font-weight:700; font-size:0.9rem; border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .live-tag { position: absolute; top: 15px; right: 15px; background: var(--primary); color: #000; padding: 4px 10px; font-family: 'Space Mono'; font-weight: 700; font-size: 0.65rem; border-radius: 4px; z-index: 10; }
        
        /* Reader Modal */
        #reader-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
        }
        #reader-modal.active { display: block; }
        .reader-header {
            height: 60px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #222;
        }
        .close-reader {
            color: var(--primary);
            font-size: 0.9rem;
            cursor: pointer;
            background: rgba(255,107,0,0.1);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 4px;
            font-family: 'Space Mono';
            font-weight: 700;
            transition: 0.3s;
        }
        .close-reader:hover { background: var(--primary); color: #000; }
        .reader-frame {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }
        .loader-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .loader { 
            width: 50px; height: 50px; 
            border: 4px solid #111; 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
            position: relative;
        }
        .search-container input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            padding: 15px 25px;
            border-radius: 30px;
            color: #fff;
            font-family: 'Space Mono';
            outline: none;
            transition: 0.3s;
        }
        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255,107,0,0.2);
        }
        .search-container i {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo"><img src="/logos/dreaming-anime-logo-round.png"> DREAMING ANIME</a>
        <a href="/" style="color:#888; text-decoration:none; font-weight:700; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">&larr; BACK TO HUB</a>
    </nav>
    <div style="text-align:center; padding:80px 20px 20px;">
        <img src="https://raw.githubusercontent.com/priscadezigns9/dreaminganime/main/mascot/mimi/mimi_shop_header.webp" style="height:180px; filter:drop-shadow(0 0 30px rgba(255,107,0,0.3));" alt="Mimi Vault">
        <h1 style="font-family:'Bangers',cursive; font-size:5rem; line-height: 1; margin: 10px 0;">THE MANGA VAULT</h1>
        <p style="font-family:'Space Mono'; color:var(--primary); letter-spacing: 2px;">CHAPTER 05 &mdash; REAL-TIME DATA ARCHIVE</p>
    </div>

    <div class="search-container">
        <input type="text" id="manga-search" placeholder="SEARCH ARCHIVE..." onkeypress="if(event.key==='Enter')searchManga()">
        <i class="fas fa-search"></i>
    </div>
    
    <div id="manga-grid" class="vault-grid">
        <!-- API Data will load here -->
    </div>

    <!-- Reader Modal -->
    <div id="reader-modal">
        <div class="reader-header">
            <span id="reader-title" style="font-family:'Bangers'; font-size:1.2rem; color: #fff; letter-spacing: 1px;">READING...</span>
            <button class="close-reader" onclick="closeReader()">[ CLOSE ]</button>
        </div>
        <div id="reader-loader" class="loader-container">
            <div class="loader"></div>
            <p style="font-family:'Space Mono'; color:var(--primary); margin-top:20px; font-size: 0.8rem;">INITIATING DIRECT-READ PROTOCOL...</p>
        </div>
        <iframe id="reader-frame" class="reader-frame"></iframe>
    </div>

    <script>
        const JIKAN_API = 'https://api.jikan.moe/v4';
        const MD_API = 'https://api.mangadex.org';

        async function loadMangaVault() {
            const grid = document.getElementById('manga-grid');
            try {
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Syncing with neural network...</p>';
                const res = await fetch(`${JIKAN_API}/top/manga?limit=24&filter=bypopularity`);
                const data = await res.json();
                renderManga(data.data);
            } catch (e) {
                console.error("Manga API Sync Error:", e);
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Vault connection delayed...</p>';
            }
        }

        async function searchManga() {
            const q = document.getElementById('manga-search').value;
            if(!q) return;
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = '<div class="loader" style="grid-column: 1/-1; margin: 40px auto;"></div>';
            
            try {
                const res = await fetch(`${JIKAN_API}/manga?q=${encodeURIComponent(q)}&limit=24`);
                const data = await res.json();
                if(data.data.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">No records found for that query.</p>';
                    return;
                }
                renderManga(data.data);
            } catch (e) {
                grid.innerHTML = '<p style="text-align:center; color:#444; width:100%;">Search failed. Try again.</p>';
            }
        }

        function renderManga(mangas) {
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = '';
            mangas.forEach(manga => {
                const card = document.createElement('div');
                card.className = 'manga-card';
                card.onclick = () => read(manga.title);
                card.innerHTML = `
                    <span class="live-tag">SYNCED</span>
                    <img src="${manga.images.jpg.large_image_url}" class="manga-img" alt="${manga.title}">
                    <div class="card-body">
                        <h3>${manga.title}</h3>
                        <p>${manga.type || 'Manga'} &mdash; ${manga.status}</p>
                        <span class="score">RANK #${manga.rank || 'N/A'}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function read(title) {
            const modal = document.getElementById('reader-modal');
            const frame = document.getElementById('reader-frame');
            const rTitle = document.getElementById('reader-title');
            const loader = document.getElementById('reader-loader');
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            rTitle.innerText = `INITIALIZING: ${title.toUpperCase()}`;
            frame.style.display = 'none';
            loader.style.display = 'block';
            frame.src = 'about:blank';

            try {
                // 1. Search MangaDex for ID
                const searchRes = await fetch(`${MD_API}/manga?title=${encodeURIComponent(title)}&limit=1&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica`);
                const searchData = await searchRes.json();
                
                if (!searchData.data || searchData.data.length === 0) throw new Error("Manga not found");
                
                const mangaId = searchData.data[0].id;
                
                // 2. Find first English chapter
                const feedRes = await fetch(`${MD_API}/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=asc&limit=1&includeExternalVol=0`);
                const feedData = await feedRes.json();
                
                if (!feedData.data || feedData.data.length === 0) {
                     // Fallback 1: Open the MangaDex title page in embed-like view if possible, or just normal
                     console.log("Direct-read: No specific English chapters found. Falling back to MangaDex title page.");
                     frame.src = `https://mangadex.org/title/${mangaId}`;
                } else {
                    const chapterId = feedData.data[0].id;
                    console.log("Direct-read: ACTIVE. Chapter ID:", chapterId);
                    frame.src = `https://mangadex.org/embed/${chapterId}`;
                }
                
                frame.onload = () => {
                    loader.style.display = 'none';
                    frame.style.display = 'block';
                    rTitle.innerText = `PLAYING: ${title.toUpperCase()}`;
                };
                
            } catch (err) {
                console.error("Reader Error:", err);
                // Fallback 2: Search on MangaDex
                frame.src = `https://mangadex.org/search?q=${encodeURIComponent(title)}`;
                frame.onload = () => {
                    loader.style.display = 'none';
                    frame.style.display = 'block';
                };
            }
        }

        function closeReader() {
            const modal = document.getElementById('reader-modal');
            const frame = document.getElementById('reader-frame');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            frame.src = 'about:blank';
        }

        window.onload = loadMangaVault;
    </script>
</body>
</html>
